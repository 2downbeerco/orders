function autofillPOItem(idx, typedName) {
  // When user picks an existing RM, auto-fill category and unit
  const match = state.rawMaterials.find(r => r.name.toLowerCase() === typedName.toLowerCase());
  if (match) {
    _poItems[idx].category = match.category;
    _poItems[idx].unit = match.unit;
    const catEl = document.getElementById(`po-cat-${idx}`);
    const unitEl = document.getElementById(`po-unit-${idx}`);
    if (catEl) catEl.value = match.category;
    if (unitEl) unitEl.value = match.unit;
  }
}

function addPOItem(){
  _poItems.push({name:'',category:'Malt',unit:'kg',qty:0,unitCost:0,gst:18});
  renderPOItems();updatePOTotals();
}
function removePOItem(idx){_poItems.splice(idx,1);renderPOItems();updatePOTotals();}

function updatePOTotals(){
  const dc=+document.getElementById('po-delivery-charge').value||0;
  const sub=_poItems.reduce((s,i)=>s+(i.qty*i.unitCost),0);
  const gst=_poItems.reduce((s,i)=>s+(i.qty*i.unitCost*(i.gst/100)),0);
  const grand=sub+gst+dc;
  document.getElementById('po-subtotal').textContent='₹'+sub.toFixed(2);
  document.getElementById('po-gst-total').textContent='₹'+gst.toFixed(2);
  document.getElementById('po-delivery-total').textContent='₹'+dc.toFixed(2);
  document.getElementById('po-grand-total').textContent='₹'+grand.toFixed(2);
}

function savePO(){
  const vendor=document.getElementById('po-vendor').value.trim();
  if(!vendor){toast('Vendor required',false);return;}
  if(!document.getElementById('po-delivery-date').value){toast('Delivery date required',false);document.getElementById('po-delivery-date').focus();return;}
  const validItems=_poItems.filter(i=>i.name.trim()&&i.qty>0);
  if(!validItems.length){toast('Add at least one item with name and qty',false);return;}

  const id=+document.getElementById('po-id').value;
  const status=document.getElementById('po-status').value;
  const isNew=!id;
  const po={
    vendor,
    orderDate:document.getElementById('po-order-date').value,
    deliveryDate:document.getElementById('po-delivery-date').value,
    deliveryCharge:+document.getElementById('po-delivery-charge').value||0,
    status,
    items:validItems,
  };

  if(id){
    const i=state.purchaseOrders.findIndex(x=>x.id===id);
    state.purchaseOrders[i]={...state.purchaseOrders[i],...po};
  } else {
    po.id=state.nextPOId++;
    po.paid=false;
    state.purchaseOrders.push(po);
  }

  // Always update stock on save (this is a receive entry)
  validItems.forEach(item=>{
    const name=item.name.trim();
    if(!name||!item.qty)return;
    let i=state.rawMaterials.findIndex(r=>r.name.toLowerCase()===name.toLowerCase());
    if(i<0){
      const newRM={
        id:state.nextRMId++, name, category:item.category||'Other',
        unit:item.unit||'kg', stock:0, reorder:0, lastCost:item.unitCost||0,
        ...(item.category==='Malt'?{warehouseStock:0,breweryStock:0}:{})
      };
      state.rawMaterials.push(newRM);
      i=state.rawMaterials.length-1;
    }
    const r=state.rawMaterials[i];
    r.lastCost=item.unitCost||0;
    if(item.batchNo) r.lastBatchNo=item.batchNo;
    if(item.extractLdk) r.extractLdk=item.extractLdk;
    if(item.alphaAcid) r.alphaAcid=item.alphaAcid;
    r.lastDeliveryDate=po.deliveryDate||null;
    if(r.category==='Malt'){
      r.warehouseStock=(r.warehouseStock||0)+item.qty;
      r.stock=(r.warehouseStock)+(r.breweryStock||0);
    } else {
      r.stock=Math.round(((r.stock||0)+item.qty)*1000)/1000;
    }
  });

  saveState();closePOModal();renderContent();
  toast(`✓ PO saved & stock updated for ${validItems.length} item(s)`);
}

function deletePO(){
  const id=+document.getElementById('po-id').value;
  if(!confirm('Delete this PO?'))return;
  state.purchaseOrders=state.purchaseOrders.filter(x=>x.id!==id);
  saveState();closePOModal();renderContent();toast('Deleted');
}

function togglePOPaid(id){
  const po=state.purchaseOrders.find(x=>x.id===id);
  if(!po)return;
  po.paid=!po.paid;
  saveState();renderContent();
  toast(po.paid?'Marked as paid':'Marked as unpaid');
}

function renderActiveStockTake(st) {
  return `
    <div class="card" style="border-color:var(--accent);">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:8px;">
        <div>
          <div style="font-size:15px;font-weight:700;">${fmtDate(st.date)} — Stock Take in Progress</div>
          <div style="font-size:13px;color:var(--muted);">Enter actual physical counts below. Leave blank if not counted yet.</div>
        </div>
        <div style="display:flex;gap:8px;">
          <button class="btn btn-danger btn-sm" onclick="cancelStockTake(${st.id})">Cancel</button>
          <button class="btn btn-green" onclick="completeStockTake(${st.id})">✓ Complete & Save</button>
        </div>
      </div>
      <div class="form-group" style="margin-bottom:16px;">
        <label class="lbl">Counted by</label>
        <input class="inp" id="st-done-by" value="${st.doneBy||''}" placeholder="Name" style="max-width:240px;"
          oninput="updateStockTakeField(${st.id},'doneBy',this.value)">
      </div>
      <div class="tbl-wrap"><table class="tbl">
        <thead><tr>
          <th>Item</th><th>Category</th><th>Expected</th><th>Actual Count</th><th>Variance</th><th>Est. Loss Value</th>
        </tr></thead>
        <tbody>
          ${st.lines.map((line,idx)=>{
            const actual = line.actual!=null?line.actual:'';
            const variance = line.actual!=null ? line.actual-line.expected : null;
            const lossVal = variance!=null&&variance<0 ? Math.abs(variance)*(line.lastCost||0) : 0;
            const varColor = variance==null?'var(--muted)':variance<0?'var(--red)':variance>0?'var(--orange)':'var(--green)';
            const varText = variance==null?'—':(variance>0?'+':'')+variance.toFixed(2)+' '+line.unit;
            return `<tr>
              <td><strong>${line.name}</strong></td>
              <td><span class="badge badge-gray" style="font-size:10px;">${line.category}</span></td>
              <td>${line.expected} ${line.unit}</td>
              <td>
                <input class="inp inp-sm" type="number" step="0.01" value="${actual}" placeholder="count"
                  style="width:100px;"
                  oninput="updateSTLine(${st.id},${idx},+this.value)">
              </td>
              <td style="font-weight:600;color:${varColor};">${varText}</td>
              <td style="font-size:13px;color:var(--red);">${lossVal>0?'₹'+lossVal.toFixed(2):'—'}</td>
            </tr>`;}).join('')}

}

function startStockTake() {
  const today = new Date().toISOString().slice(0,10);
  const lines = state.rawMaterials.map(r=>({
    rmId: r.id,
    name: r.name,
    category: r.category,
    unit: r.unit,
    expected: +(rmStatus(r).total),
    actual: null,
    variance: null,
    lastCost: r.lastCost||0,
  }));
  const st = { id: state.nextSTId++, date: today, status:'In Progress', doneBy:'', lines };
  state.stockTakes.push(st);
  saveState();
  renderContent();
  toast('Stock take started');
}

function updateStockTakeField(id, field, val) {
  const st = state.stockTakes.find(s=>s.id===id);
  if(st) { st[field]=val; saveState(); }
}

function updateSTLine(stId, idx, val) {
  const st = state.stockTakes.find(s=>s.id===stId);
  if(!st) return;
  st.lines[idx].actual = val;
  st.lines[idx].variance = val - st.lines[idx].expected;
  saveState();
  // re-render just the variance cell without full re-render for smoothness
  renderContent();
}

function completeStockTake(id) {
  const st = state.stockTakes.find(s=>s.id===id);
  if(!st) return;
  const counted = st.lines.filter(l=>l.actual!=null).length;
  if(counted===0){toast('Count at least one item before completing',false);return;}
  if(!confirm(`Complete stock take? ${counted} of ${st.lines.length} items counted. Stock levels will be updated to actual counts.`)) return;

  // Update stock levels to actual counts
  st.lines.forEach(line=>{
    if(line.actual==null) return;
    const i = state.rawMaterials.findIndex(r=>r.id===line.rmId);
    if(i<0) return;
    const r = state.rawMaterials[i];
    if(r.category==='Malt'){
      // distribute actual across warehouse+brewery proportionally
      const prev = (r.warehouseStock||0)+(r.breweryStock||0);
      if(prev>0){
        const ratio = line.actual/prev;
        r.warehouseStock = Math.round((r.warehouseStock||0)*ratio*1000)/1000;
        r.breweryStock   = Math.round((r.breweryStock||0)*ratio*1000)/1000;
      } else {
        r.warehouseStock = line.actual;
        r.breweryStock   = 0;
      }
      r.stock = r.warehouseStock + r.breweryStock;
    } else {
      r.stock = line.actual;
    }
  });

  st.status = 'Completed';
  saveState();
  renderContent();
  const variances = st.lines.filter(l=>l.variance!==0&&l.actual!=null).length;
  toast(`Stock take complete. ${variances} variance${variances!==1?'s':''} recorded.`);
}

function cancelStockTake(id) {
  if(!confirm('Cancel this stock take? No changes will be saved.')) return;
  state.stockTakes = state.stockTakes.filter(s=>s.id!==id);
  saveState();
  renderContent();
  toast('Stock take cancelled');
}

function openStockTakeView(id) {
  const st = state.stockTakes.find(s=>s.id===id);
  if(!st) return;
  const variances = st.lines.filter(l=>l.variance!==0&&l.actual!=null);
  const totalLoss = st.lines.reduce((s,l)=>s+(l.variance<0?Math.abs(l.variance)*(l.lastCost||0):0),0);

  document.getElementById('st-view-title').textContent = `${fmtDate(st.date)} Stock Take — ${st.doneBy||''}`;
  document.getElementById('st-view-body').innerHTML = `
    ${totalLoss>0?`<div style="background:#FEE2E2;border:1px solid #FCA5A5;border-radius:8px;padding:10px 14px;margin-bottom:16px;font-size:13px;color:var(--red);">
      Total estimated wastage: <strong>₹${totalLoss.toFixed(2)}</strong>
    </div>`:'<div style="background:#DCFCE7;border:1px solid #86EFAC;border-radius:8px;padding:10px 14px;margin-bottom:16px;font-size:13px;color:var(--green);">✓ No wastage recorded</div>'}
    <div class="tbl-wrap"><table class="tbl">
      <thead><tr><th>Item</th><th>Category</th><th>Expected</th><th>Actual</th><th>Variance</th><th>Loss Value</th></tr></thead>
      <tbody>${st.lines.filter(l=>l.actual!=null).map(line=>{
        const varColor = line.variance<0?'var(--red)':line.variance>0?'var(--orange)':'var(--green)';
        const varText = (line.variance>0?'+':'')+line.variance.toFixed(2)+' '+line.unit;
        const lossVal = line.variance<0?'₹'+Math.abs(line.variance*(line.lastCost||0)).toFixed(2):'—';
        return `<tr>
          <td><strong>${line.name}</strong></td>
          <td><span class="badge badge-gray" style="font-size:10px;">${line.category}</span></td>
          <td>${line.expected} ${line.unit}</td>
          <td>${line.actual} ${line.unit}</td>
          <td style="font-weight:600;color:${varColor};">${varText}</td>
          <td style="color:var(--red);">${lossVal}</td>
        </tr>`;}).join('')}
      </tbody>
    </table></div>`;
  document.getElementById('st-view-modal').style.display='flex';
}

  const sorted=[...items].sort((a,b)=>a.date.localeCompare(b.date));
  return `
    <div style="display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:20px;flex-wrap:wrap;">
      <div style="display:flex;gap:8px;">${['All','Planned','Completed','Cancelled'].map(s=>`<button class="btn btn-sm ${filter===s?'btn-primary':'btn-ghost'}" onclick="setSchedFilter('${s}')">${s}</button>`).join('')}</div>
      <button class="btn btn-primary" onclick="openAddSched()">+ Schedule Brew</button>
    </div>
    ${sorted.length===0?'<div class="empty">No brews found.</div>':sorted.map(s=>{
      const dt=new Date(s.date+'T00:00:00');
      const day=dt.getDate(),mon=dt.toLocaleDateString('en-IN',{month:'short'});
      const sc={Planned:'badge-blue',Completed:'badge-green',Cancelled:'badge-red','In Progress':'badge-orange'}[s.status]||'badge-gray';
      return `<div class="sched-row">
        <div class="sched-date"><div class="day">${day}</div><div class="mon">${mon}</div></div>
        <div class="sched-body">
          <div class="beer-dot" style="background:${beerColor(s.beer)}"></div>
          <div style="flex:1;"><div class="beer-name">${beerName(s.beer)}</div><div class="sched-meta">${s.vol}L · ${s.notes||''}</div></div>
          <span class="badge ${sc}">${s.status}</span>
        </div>
        <div class="sched-actions"><button class="btn btn-sm btn-ghost" onclick="editSched(${s.id})">✏️</button></div>
      </div>`;}).join('')}

    <div id="sched-modal" class="modal-overlay" style="display:none;" onclick="if(event.target===this)closeSchedModal()">
      <div class="modal-box">
        <div class="modal-title" id="sched-modal-title">Schedule Brew</div>
        <input type="hidden" id="sm-id">
        <div class="form-row form-row-2">
          <div class="form-group"><label class="lbl">Brew Date</label><input class="inp" id="sm-date" type="date"></div>
          <div class="form-group"><label class="lbl">Beer</label>
            <select class="inp" id="sm-beer">${getBeers(true).map(b=>`<option value="${b.code}">${b.name}</option>`).join('')}</select>
          </div>
        </div>
        <div class="form-row form-row-2">
          <div class="form-group"><label class="lbl">Volume (L)</label><input class="inp" id="sm-vol" type="number" value="1000"></div>
          <div class="form-group"><label class="lbl">Status</label>
            <select class="inp" id="sm-status"><option>Planned</option><option>In Progress</option><option>Completed</option><option>Cancelled</option></select>
          </div>
        </div>
        <div class="form-group"><label class="lbl">Notes</label><textarea class="inp" id="sm-notes" rows="3"></textarea></div>
        <div class="modal-actions">
          <button class="btn btn-ghost" onclick="closeSchedModal()">Cancel</button>
          <button class="btn btn-danger btn-sm" id="sm-delete" onclick="deleteSched()" style="display:none;">Delete</button>
          <button class="btn btn-primary" onclick="saveSched()">Save</button>
        </div>
      </div>
    </div>`;
}
function setSchedFilter(f){window._schedFilter=f;renderContent();}
function openAddSched(){
  document.getElementById('sched-modal-title').textContent='Schedule Brew';
  document.getElementById('sm-id').value='';
  document.getElementById('sm-date').value='';
  document.getElementById('sm-beer').value=getBeers(true)[0]?.code||'';
  document.getElementById('sm-vol').value='1000';
  document.getElementById('sm-status').value='Planned';
  document.getElementById('sm-notes').value='';
  document.getElementById('sm-delete').style.display='none';
  document.getElementById('sched-modal').style.display='flex';
}
function editSched(id){
  const s=state.schedule.find(x=>x.id===id);if(!s)return;
  document.getElementById('sched-modal-title').textContent='Edit Brew';
  document.getElementById('sm-id').value=s.id;
  document.getElementById('sm-date').value=s.date;
  document.getElementById('sm-beer').value=s.beer;
  document.getElementById('sm-vol').value=s.vol;
  document.getElementById('sm-status').value=s.status;
  document.getElementById('sm-notes').value=s.notes||'';
  document.getElementById('sm-delete').style.display='inline-flex';
  document.getElementById('sched-modal').style.display='flex';
}
function closeSchedModal(){document.getElementById('sched-modal').style.display='none';}
function saveSched(){
  const id=+document.getElementById('sm-id').value;
  const obj={date:document.getElementById('sm-date').value,beer:document.getElementById('sm-beer').value,vol:+document.getElementById('sm-vol').value||1000,status:document.getElementById('sm-status').value,notes:document.getElementById('sm-notes').value.trim()};
  if(!obj.date){toast('Date required',false);return;}
  if(id){const i=state.schedule.findIndex(x=>x.id===id);state.schedule[i]={...state.schedule[i],...obj};}
  else{obj.id=state.nextSchedId++;state.schedule.push(obj);}
  saveState();closeSchedModal();renderContent();toast('Saved');
}
function deleteSched(){
  const id=+document.getElementById('sm-id').value;
  if(!confirm('Delete this brew?'))return;
  state.schedule=state.schedule.filter(x=>x.id!==id);
  saveState();closeSchedModal();renderContent();toast('Deleted');
}

function checkBrewPw() {
  const val = document.getElementById('brew-pw').value;
  if (val === '1002') {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app').style.display = 'flex';
    document.getElementById('brew-pw-err').textContent = '';
  } else {
    const err = document.getElementById('brew-pw-err');
    err.textContent = 'Incorrect password';
    document.getElementById('brew-pw').value = '';
    document.getElementById('brew-pw').focus();
    setTimeout(() => err.textContent = '', 2000);
  }
}

        ${inactive.map(b=>`
          <div style="background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:8px 14px;display:flex;align-items:center;gap:10px;">
            <div style="width:10px;height:10px;border-radius:50%;background:${b.color};opacity:0.4;"></div>
            <span style="font-size:13px;color:var(--muted);">${b.name} <span style="font-size:11px;">(${b.code})</span></span>
            <button class="btn btn-ghost btn-sm" style="padding:3px 8px;" onclick="openEditBeer('${b.code}')">✏️</button>

    <!-- Beer Batch List Modal -->

      <div class="modal-box" style="max-width:680px;max-height:90vh;overflow-y:auto;" id="beer-batches-box"></div>

function openBeerBatches(beerCode) {
  const b = state.beers.find(x=>x.code===beerCode);
  if (!b) return;
  const logs = state.brewLogs.filter(l=>l.beer===beerCode).sort((a,c)=>c.date.localeCompare(a.date));
  const stageColors = { Fermenting:'#2563EB', Conditioning:'#7C3AED', Carbonating:'#0EA5E9', Ready:'#16A34A', Empty:'#9CA3AF', Completed:'#16A34A' };

  document.getElementById('beer-batches-box').innerHTML = `
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;">
      <div>
        <div style="display:flex;align-items:center;gap:10px;">
          <div style="width:16px;height:16px;border-radius:50%;background:${b.color};"></div>
          <div style="font-size:20px;font-weight:700;">${b.name}</div>
        </div>
        <div style="font-size:13px;color:var(--muted);margin-top:4px;">${logs.length} batch${logs.length!==1?'es':''} brewed</div>
      </div>
      <button class="btn btn-ghost btn-sm" onclick="document.getElementById('beer-batches-modal').style.display='none'">✕</button>
    </div>

    ${logs.length===0 ? '<div class="empty">No brews logged for this beer yet.</div>' : logs.map(log=>{
      const tank = state.tanks.find(t=>t.batchNo===log.batchNo && t.beer===beerCode);
      const gLog = tank ? (state.gravityLogs[tank.id]||[]) : [];
      const statusColor = stageColors[tank?.stage||log.status]||'#9CA3AF';
      const currentStage = tank ? tank.stage : log.status;

      // Lifecycle steps
      const steps = [
        { label:'Brewed',       done: !!log.date,                 date: log.date,                  detail: `${log.targetVol}L · Batch ${log.batchNo||'—'}` },
        { label:'Fermenting',   done: !!tank && tank.stage!=='Empty', date: tank?.since,            detail: gLog.length ? `${gLog.length} gravity readings · Last: SG ${gLog[gLog.length-1]?.sg}` : 'No gravity readings yet' },
        { label:'Conditioning', done: ['Conditioning','Carbonating','Ready'].includes(tank?.stage), date: null, detail: '' },
        { label:'Carbonating',  done: ['Carbonating','Ready'].includes(tank?.stage)||!!tank?.carbonationVol, date: tank?.carbonationDate, detail: tank?.carbonationVol ? `${tank.carbonationVol} vol CO₂` : '' },
        { label:'Ready',        done: tank?.stage==='Ready'||!!tank?.readyDate, date: tank?.readyDate, detail: '' },
      ];

      return `<div class="card" style="margin-bottom:12px;cursor:pointer;border-left:4px solid ${statusColor};" onclick="openBatchDetail('${log.id}')">
        <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:12px;">
          <div>
            <div style="font-size:15px;font-weight:700;">Batch ${log.batchNo||log.id} · ${fmtDate(log.date)}</div>
            <div style="font-size:13px;color:var(--muted);">Brewer: ${log.brewer||'—'} · ${log.targetVol}L${log.yieldEst?' · Yield: '+log.yieldEst+'L':''}</div>
          </div>
          <span class="badge" style="background:${statusColor}20;color:${statusColor};white-space:nowrap;">${currentStage}</span>
        </div>
        <!-- Lifecycle timeline -->
        <div style="display:flex;align-items:center;gap:0;">
          ${steps.map((step,si)=>`
            <div style="flex:1;text-align:center;">
              <div style="width:24px;height:24px;border-radius:50%;background:${step.done?'var(--green)':'var(--border)'};
                color:${step.done?'#fff':'var(--muted)'};font-size:12px;font-weight:700;
                display:flex;align-items:center;justify-content:center;margin:0 auto;">
                ${step.done?'✓':(si+1)}
              </div>
              <div style="font-size:10px;font-weight:600;color:${step.done?'var(--text)':'var(--muted)'};margin-top:4px;">${step.label}</div>
              ${step.date?`<div style="font-size:9px;color:var(--muted);">${fmtDate(step.date)}</div>`:''}
            </div>
            ${si<steps.length-1?`<div style="flex:0 0 20px;height:2px;background:${step.done&&steps[si+1].done?'var(--green)':'var(--border)'};margin-bottom:22px;"></div>`:''}`
          ).join('')}
        </div>
        <div style="font-size:11px;color:var(--muted);margin-top:8px;text-align:right;">Tap to view full detail →</div>
      </div>`;
    }).join('')}
  `;
  document.getElementById('beer-batches-modal').style.display='flex';
}

function openBatchDetail(logId) {
  const log = state.brewLogs.find(b=>b.id==logId);
  if (!log) return;
  const b = state.beers.find(x=>x.code===log.beer);
  const tank = state.tanks.find(t=>t.batchNo===log.batchNo && t.beer===log.beer);
  const gLog = tank ? (state.gravityLogs[tank.id]||[]) : [];
  const ex = log.execution || {};
  const stageColors = { Fermenting:'#2563EB', Conditioning:'#7C3AED', Carbonating:'#0EA5E9', Ready:'#16A34A', Completed:'#16A34A' };

  function section(title, content) {
    return `<div style="border:1px solid var(--border);border-radius:10px;padding:16px;margin-bottom:14px;">
      <div style="font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:12px;">${title}</div>
      ${content}
    </div>`;
  }
  function row(label, val) {
    return val ? `<div style="display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid var(--border);font-size:13px;">
      <span style="color:var(--muted);">${label}</span><span style="font-weight:600;">${val}</span></div>` : '';
  }

  document.getElementById('batch-detail-box').innerHTML = `
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;">
      <div>
        <div style="font-size:18px;font-weight:700;">${beerName(log.beer)} · Batch ${log.batchNo||log.id}</div>
        <div style="font-size:13px;color:var(--muted);">Brewed ${fmtDate(log.date)} · ${log.targetVol}L · ${log.brewer||'—'}</div>
      </div>
      <button class="btn btn-ghost btn-sm" onclick="document.getElementById('batch-detail-modal').style.display='none'">✕</button>
    </div>

    ${section('🍺 Brew Summary',
      row('Beer', beerName(log.beer)) +
      row('Batch No.', log.batchNo||'—') +
      row('Brew Date', fmtDate(log.date)) +
      row('Brewer', log.brewer||'—') +
      row('Target Volume', log.targetVol+'L') +
      row('Yield', log.yieldEst?log.yieldEst+'L':'—') +
      row('Target OG / FG', (log.ogTarget||'—')+' / '+(log.fgTarget||'—')) +
      row('Actual OG', ex.ogActual||log.ogActual||'—') +
      row('Target ABV', b?.abv?b.abv+'%':'—')
    )}

    ${section('🌡️ Fermentation',
      (tank ? row('Tank', tank.name) + row('Fermenting since', fmtDate(tank.since)) : '<div style="color:var(--muted);font-size:13px;">Not yet assigned to a tank.</div>') +
      (gLog.length ? `<div class="tbl-wrap" style="margin-top:10px;"><table class="tbl" style="font-size:13px;">
        <thead><tr><th>Date</th><th>Day</th><th>SG</th><th>Temp</th><th>Notes</th></tr></thead>
        <tbody>${gLog.map(g=>`<tr>
          <td>${fmtDate(g.date)}</td>
          <td>${tank?.since?daysSince(tank.since)-(daysSince(g.date)||0)+daysSince(g.date):'—'}</td>
          <td><strong>${g.sg}</strong></td>
          <td>${g.temp!=null?g.temp+'°C':'—'}</td>
          <td style="color:var(--muted);">${g.note||''}</td>
        </tr>`).join('')}</tbody>
      </table></div>` : '')
    )}

    ${section('❄️ Conditioning & Carbonation',
      row('Conditioning Stage', tank?.stage==='Conditioning'?'In Progress':(['Carbonating','Ready'].includes(tank?.stage)?'Complete':'—')) +
      row('CO₂ Volume', tank?.carbonationVol?tank.carbonationVol+' vol':'—') +
      row('Carbonation Date', fmtDate(tank?.carbonationDate)) +
      row('Ready for Dispatch', fmtDate(tank?.readyDate))
    )}

    ${section('🛢️ Current Status',
      row('Tank', tank?.name||'—') +
      row('Stage', tank?.stage||log.status) +
      row('Current Temp', tank?.temp!=null?tank.temp+'°C':'—') +
      row('Latest SG', gLog.length?gLog[gLog.length-1].sg:'—')
    )}

    <div style="display:flex;gap:8px;flex-wrap:wrap;">
      <button class="btn btn-ghost" onclick="switchTab('brew_log');window._openBrewId=${log.id};renderNav();renderContent();document.getElementById('batch-detail-modal').style.display='none'">
        📋 View Brew Log
      </button>
      ${tank?`<button class="btn btn-ghost" onclick="switchTab('tanks');renderNav();renderContent();document.getElementById('batch-detail-modal').style.display='none';setTimeout(()=>openTankDetail('${tank.id}'),100)">
        🛢️ View Tank
      </button>`:''}
    </div>
  `;
  document.getElementById('batch-detail-modal').style.display='flex';
}

  document.getElementById('bm-code').value=b.code;

  setTimeout(()=>selectBeerColor(b.color||BEER_COLORS[0]),50);
}

function closeBeerModal() { document.getElementById('beer-modal').style.display='none'; }

function saveBeer() {
  const name = document.getElementById('bm-name').value.trim();
  const code = document.getElementById('bm-code').value.trim().toUpperCase();
  const origCode = document.getElementById('bm-code-orig').value;
  if(!name){toast('Beer name required',false);return;}
  if(!code){toast('Code required',false);return;}

  // Check code uniqueness (allow same code if editing same beer)
  const dup = state.beers.find(b=>b.code===code && b.code!==origCode);
  if(dup){toast(`Code "${code}" already used by ${dup.name}`,false);return;}

  const obj = {
    code,
    name,
    style: document.getElementById('bm-style').value,
    color: document.getElementById('bm-color').value||BEER_COLORS[0],
    abv: +document.getElementById('bm-abv').value||null,
    ibu: +document.getElementById('bm-ibu').value||null,
    notes: document.getElementById('bm-notes').value.trim(),
    active: document.getElementById('bm-active').value!=='false',
  };

  if(origCode) {
    const i = state.beers.findIndex(b=>b.code===origCode);
    state.beers[i] = {...state.beers[i],...obj};
  } else {
    state.beers.push(obj);
    // Add to beer inventory if new
    if(!state.beerInventory.find(b=>b.beer===code)){
      state.beerInventory.push({id:Date.now(),beer:code,kegs20:0,kegs50:0,litres:0,location:'Cold Room'});
    }
  }
  saveState();closeBeerModal();renderContent();
  toast(origCode?'Beer updated':'New beer added');
}

// ── Init ──────────────────────────────────────────────────────────────────────
(function init(){
  document.getElementById('topbar-date').textContent=new Date().toLocaleDateString('en-IN',{weekday:'long',day:'numeric',month:'long',year:'numeric'});
  setTimeout(() => { const pw = document.getElementById('brew-pw'); if (pw) pw.focus(); }, 100);

  // 1. Load from localStorage immediately and render
  SYNC_KEYS.forEach(key => {
    try {
      const v = localStorage.getItem('brew_' + key);
      if (v) state[key] = JSON.parse(v);
    } catch(e) {}
  });
  renderNav(); renderContent();

  // 2. Sync from Supabase in background — same pattern as bar order app
  setSyncStatus('Syncing...', '#D4821A');
  sbGetBrewState().then(rows => {
    if (rows && rows.length > 0) {
      rows.forEach(row => {
        if (!SYNC_KEYS.includes(row.key)) return;
        state[row.key] = row.value;
        localStorage.setItem('brew_' + row.key, JSON.stringify(row.value));
      });
    } else {
      // Nothing in Supabase yet — push local state up
      SYNC_KEYS.forEach(key => sbUpsertBrewKey(key, state[key]).catch(()=>{}));
    }
    setSyncStatus('Live', '#16A34A');
    setTimeout(() => setSyncStatus('', ''), 2000);
    try { renderNav(); renderContent(); } catch(e) {}
    startAutoSync();
  }).catch(e => {
    console.error('Supabase initial sync error:', e);
    setSyncStatus('Offline', '#DC2626');
    startAutoSync();
  });
})();
</script>
