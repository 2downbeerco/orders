              ${k.missing ? `<span style="background:#fee2e2;color:#DC2626;padding:1px 8px;border-radius:4px;font-size:11px;font-weight:700">MISSING</span>` : ''}
            </div>
          </div>
          <button onclick="closeModal()" style="background:none;border:none;font-size:24px;cursor:pointer;color:#999;line-height:1;padding:0">&times;</button>
        </div>
        <div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:#999;margin-bottom:10px">Keg History &nbsp;(${history.length} events)</div>
        <div style="max-height:400px;overflow-y:auto">${historyRows}</div>
        <div style="margin-top:16px;text-align:right">
          <button onclick="closeModal()" style="background:#e0e0e0;border:none;padding:8px 20px;border-radius:6px;font-weight:600;cursor:pointer;font-size:13px">Close</button>
        </div>
      </div>
    </div>`;
}

// ── Beers Tab ─────────────────────────────────────────────────────────────
let newBatchBeer = ''; // tracks which beer the inline add form is for

function pageBeers() {
  const beerRows = BEERS.map((b, i) => {
    const batches = breweryBeers.filter(bb => bb.beer === b.code);
    const totalLitres = batches.reduce((s, bb) => s + (Number(bb.litres)||0), 0);

    const batchRows = batches.length > 0
      ? batches.map((bb) => {
          const globalIdx = breweryBeers.findIndex(x => x.beer === b.code && x.batch === bb.batch);
          return `<tr style="background:var(--bg)">
            <td style="padding:8px 14px;font-size:12px" colspan="2"></td>
            <td style="padding:8px 14px;font-size:13px;font-family:monospace;font-weight:600">${bb.batch}</td>
            <td style="padding:8px 14px">
              <div style="display:flex;align-items:center;gap:8px">
                <input type="number" min="0" class="inp" style="width:100px;padding:5px 8px;font-size:13px;font-weight:600;color:var(--orange)"
                  value="${bb.litres||0}"
                  onchange="updateBatchLitres(${globalIdx}, this.value)"
                  title="Edit litres">
                <span style="font-size:12px;color:var(--muted)">L</span>
              </div>
            </td>
            <td style="padding:8px 14px">
              <button class="btn btn-danger btn-sm" onclick="removeBreweryBeer(${globalIdx})">Remove</button>
            </td>
          </tr>`;
        }).join('')
      : '';

    const showAddForm = newBatchBeer === b.code;

    return `<tr style="border-bottom:${batches.length>0||showAddForm?'none':''}">
      <td class="sticky-col" style="font-size:14px;font-weight:600">${b.name}</td>
      <td style="font-weight:700;font-size:14px">${badge(b.code,'#888')}</td>
      <td style="font-size:13px;color:var(--muted)">
        ${batches.length > 0 ? `${batches.length} batch${batches.length!==1?'es':''}` : '<span style="color:var(--muted)">No batches</span>'}
      </td>
      <td style="font-weight:700;color:var(--accent)">${totalLitres > 0 ? totalLitres+'L' : '--'}</td>
      <td>
        <div style="display:flex;gap:6px">
          <button class="btn btn-ghost btn-sm" onclick="newBatchBeer=newBatchBeer==='${b.code}'?'':'${b.code}';renderPage()">+ Batch</button>
          ${BEERS.length > 1
            ? `<button class="btn btn-danger btn-sm" onclick="removeBeer(${i})">Remove</button>`
            : ''}
        </div>
      </td>
    </tr>
    ${batchRows}
    ${showAddForm ? `<tr style="background:var(--accent-bg);border-bottom:2px solid rgba(212,130,26,0.2)">
      <td colspan="5" style="padding:12px 14px">
        <div style="display:flex;gap:10px;align-items:flex-end;flex-wrap:wrap">
          <div>
            <label class="lbl">Batch Number</label>
            <input id="new-batch-no-${b.code}" class="inp" style="width:160px" placeholder="e.g. BB-2025-04">
          </div>
          <div>
            <label class="lbl">Quantity (Litres)</label>
            <input id="new-batch-litres-${b.code}" class="inp" style="width:120px" type="number" min="0" placeholder="e.g. 500">
          </div>
          <button class="btn btn-primary" onclick="saveBatchForBeer('${b.code}')">Save</button>
          <button class="btn btn-ghost" onclick="newBatchBeer='';renderPage()">Cancel</button>
        </div>
      </td>
    </tr>` : ''}`;
  }).join('');

  return `
    <div style="max-width:760px">
      <div class="card" style="margin-bottom:20px">
        <div class="section-title">Beer Inventory</div>
        <div class="tbl-wrap">
          <table class="tbl">
            <thead><tr><th class="sticky-col">Name</th><th>Code</th><th>Batches</th><th>Total Litres</th><th></th></tr></thead>
            <tbody>${beerRows}</tbody>
          </table>
        </div>
        <div style="display:flex;gap:10px;align-items:flex-end;margin-top:20px;padding-top:16px;border-top:1px solid var(--border);flex-wrap:wrap">
          <div>
            <label class="lbl">Beer Code</label>
            <input id="new-beer-code" class="inp" style="width:100px;text-transform:uppercase" placeholder="e.g. IPA" maxlength="6"
              value="${newBeer.code}" oninput="newBeer.code=this.value.toUpperCase()">
          </div>
          <div>
            <label class="lbl">Beer Name</label>
            <input id="new-beer-name" class="inp" style="width:220px" placeholder="e.g. India Pale Ale"
              value="${newBeer.name}" oninput="newBeer.name=this.value">
          </div>
          <button class="btn btn-primary" onclick="addBeer()">+ Add Beer</button>
        </div>
      </div>
    </div>`;
}

function saveBatchForBeer(beerCode) {
  const batchEl = document.getElementById(`new-batch-no-${beerCode}`);
  const litresEl = document.getElementById(`new-batch-litres-${beerCode}`);
  const batch = batchEl?.value?.trim();
  const litres = Number(litresEl?.value) || 0;
  if (!batch) { alert('Please enter a batch number.'); return; }
  if (breweryBeers.find(x => x.beer === beerCode && x.batch === batch)) {
    alert('This batch number already exists for this beer.'); return;
  }
  breweryBeers.push({ beer: beerCode, batch, litres });
  newBatchBeer = '';
  saveBreweryBeers();
  renderPage();
}

function updateBatchLitres(idx, value) {
  if (!breweryBeers[idx]) return;
  breweryBeers[idx].litres = Number(value) || 0;
  saveBreweryBeers();
  // Update total litres display without full re-render
  renderPage();
}

// ── Rate Card ─────────────────────────────────────────────────────────────
// rateCard: { barId: { beerCode: { rate, date } } }
let rateCard = {};
let rcSearch = '';
let rcExpandedBar = null;
let rcEditBarId = null;

const MRP_PER_LITRE = 134.4;

async function saveRateCard() {
  localStorage.setItem('2down_ratecard', JSON.stringify(rateCard));
  try { await sbUpsert('kegs', '__ratecard__', { rateCard }); } catch(_) {}
}

function pageRateCard() {
  const activeBars = bars.filter(b => !b.inactive)
    .sort((a,b) => a.barName.localeCompare(b.barName))
    .filter(b => !rcSearch || b.barName.toLowerCase().includes(rcSearch.toLowerCase()));

  const rows = activeBars.map(b => {
    const rates = rateCard[b.id] || {};
    const isExpanded = rcExpandedBar === b.id;
    const isEditing = rcEditBarId === b.id;

    const beerRows = BEERS.map(beer => {
      const r = rates[beer.code] || {};
      const total = r.rate ? Number(r.rate) : null;
      const svc = total ? (total - MRP_PER_LITRE).toFixed(2) : null;
      const rateDate = r.date || '';

      if (isEditing) {
        return `<tr>
          <td style="font-weight:600">${badge(beer.code,'#888')} ${beer.name}</td>
          <td>
            <div style="display:flex;align-items:center;gap:5px">
              <span style="color:var(--muted);font-size:13px">₹</span>
              <input type="number" min="0" step="0.1" class="inp" style="width:95px;font-size:13px;padding:5px 8px"
                placeholder="e.g. 400" value="${total||''}"
                data-rc-rate="${b.id}-${beer.code}">
              <span style="color:var(--muted);font-size:12px">/L</span>
            </div>
          </td>
          <td style="font-family:monospace;font-size:13px;color:var(--muted)">₹${MRP_PER_LITRE}/L</td>
          <td style="font-family:monospace;font-size:13px;color:var(--muted)">${total ? '₹'+svc+'/L' : '—'}</td>
          <td>
            <input type="date" class="inp" style="width:150px;font-size:12px;padding:5px 8px"
              value="${rateDate}"
              data-rc-date="${b.id}-${beer.code}">
          </td>
        </tr>`;
      }

      return `<tr>
        <td style="font-weight:600">${badge(beer.code,'#888')} ${beer.name}</td>
        <td style="font-family:monospace;font-size:14px;font-weight:700">
          ${total ? `₹${total}/L` : `<span style="color:var(--muted)">—</span>`}
        </td>
        <td style="font-family:monospace;font-size:13px;color:var(--muted)">₹${MRP_PER_LITRE}/L</td>
        <td style="font-family:monospace;font-size:13px;color:var(--muted)">${svc ? '₹'+svc+'/L' : '—'}</td>
        <td style="font-size:12px;color:var(--muted)">${rateDate ? fmtDate(rateDate) : '—'}</td>
      </tr>`;
    }).join('');

    // Invoicing entity — always editable inline, not tied to edit mode
    const entity = rates.__entity__ || 'SAGA GYPSY BEER PROJECT';
    const entityRow = `<div style="display:flex;align-items:center;gap:12px;margin-bottom:16px;padding-bottom:16px;border-bottom:1px solid var(--border);flex-wrap:wrap">
      <span style="font-size:12px;color:var(--muted);white-space:nowrap">Service Invoice by:</span>
      <div style="display:flex;gap:8px">
        <button onclick="setBarEntity(${b.id},'SAGA GYPSY BEER PROJECT');event.stopPropagation()"
          class="btn btn-sm ${entity==='SAGA GYPSY BEER PROJECT'?'btn-primary':'btn-ghost'}"
          style="font-size:12px;padding:5px 12px">SAGA GYPSY BEER PROJECT</button>
        <button onclick="setBarEntity(${b.id},'TWO DOWN HOSPITALITY');event.stopPropagation()"
          class="btn btn-sm ${entity==='TWO DOWN HOSPITALITY'?'btn-primary':'btn-ghost'}"
          style="font-size:12px;padding:5px 12px">TWO DOWN HOSPITALITY</button>
      </div>
    </div>`;

    const expandedPanel = isExpanded ? `
      <div style="padding:0 18px 18px">
        ${entityRow}
        <table class="tbl" style="font-size:13px">
          <thead><tr>
            <th>Beer</th>
            <th style="color:var(--orange)">Total Rate</th>
            <th>MRP Rate</th>
            <th>Service Rate</th>
            <th>Effective From</th>
          </tr></thead>
          <tbody>${beerRows}</tbody>
        </table>
        <div style="display:flex;gap:10px;margin-top:14px">
          ${isEditing
            ? `<button class="btn btn-primary btn-sm" onclick="saveRateCardBar(${b.id})">Save</button>
               <button class="btn btn-ghost btn-sm" onclick="rcEditBarId=null;renderPage()">Cancel</button>`
            : `<button class="btn btn-ghost btn-sm" onclick="rcEditBarId=${b.id};renderPage()">✎ Edit Rates</button>`}
        </div>
      </div>` : '';

    return `<div data-search='${b.barName} ${b.area} ${(rates.__entity__||'SAGA GYPSY BEER PROJECT')}' style="border:1px solid var(--border);border-radius:10px;margin-bottom:10px;overflow:hidden">
      <div style="display:flex;align-items:center;gap:14px;padding:14px 18px;cursor:pointer"
        onclick="rcExpandedBar=rcExpandedBar===${b.id}?null:${b.id};rcEditBarId=null;renderPage()">
        <div style="flex:1">
          <div style="font-weight:600;font-size:14px">${b.barName}</div>
          <div style="font-size:11px;color:var(--muted);margin-top:2px">${b.area}</div>
        </div>
        <div style="display:flex;align-items:center;gap:12px">
          ${rates.__entity__ ? `<span style="font-size:11px;color:var(--muted)">${rates.__entity__}</span>` : ''}
          <div style="font-size:16px;color:var(--muted)">${isExpanded ? '▲' : '▼'}</div>
        </div>
      </div>
      ${expandedPanel}
    </div>`;
  }).join('') || `<div class="empty">No bars found</div>`;

  return `
    <div style="display:flex;gap:10px;align-items:center;margin-bottom:20px;flex-wrap:wrap">
      <input id="rc-search-inp" class="inp" placeholder="Search bar or invoicing entity…" value="${rcSearch}"
        oninput="setRcSearch(this.value)" style="width:300px">
      <span id="rc-count" style="font-size:12px;color:var(--muted)">${activeBars.length} bars</span>
      <div style="font-size:12px;color:var(--muted);margin-left:auto">
        MRP fixed at <b>₹${MRP_PER_LITRE}/litre</b> · Service = Total − MRP
      </div>
    </div>
    <div id="rc-tbody">${rows}</div>`;
}

function setRate(barId, beerCode, field, value) {
  if (!rateCard[barId]) rateCard[barId] = {};
  if (!rateCard[barId][beerCode]) rateCard[barId][beerCode] = { rate: '', date: '' };
  rateCard[barId][beerCode][field] = value;
}

function setBarEntity(barId, entity) {
  if (!rateCard[barId]) rateCard[barId] = {};
  rateCard[barId].__entity__ = entity;
  saveRateCard();
  renderPage();
}

function saveRateCardBar(barId) {
  // Read beer rates and dates from DOM
  BEERS.forEach(beer => {
    const rateInp = document.querySelector(`input[data-rc-rate="${barId}-${beer.code}"]`);
    const dateInp = document.querySelector(`input[data-rc-date="${barId}-${beer.code}"]`);
    if (rateInp || dateInp) {
      if (!rateCard[barId]) rateCard[barId] = {};
      if (!rateCard[barId][beer.code]) rateCard[barId][beer.code] = { rate: '', date: '' };
      if (rateInp) rateCard[barId][beer.code].rate = rateInp.value ? Number(rateInp.value) : '';
      if (dateInp) rateCard[barId][beer.code].date = dateInp.value || '';
      if (!rateCard[barId][beer.code].rate && !rateCard[barId][beer.code].date) {
        delete rateCard[barId][beer.code];
      }
    }
  });
  rcEditBarId = null;
  saveRateCard();
  renderPage();
}

// ── Invoicing ─────────────────────────────────────────────────────────────
// invData: { orderId: { mrpDiscount, svcDiscount } }
let invData = {};
let invWeekOffset = 0;

async function saveInvData() {
  localStorage.setItem('2down_inv_data', JSON.stringify(invData));
  try { await sbUpsert('kegs', '__inv_data__', { invData }); } catch(_) {}
}

function pageInvoicing() {
  const now = new Date();
  const wStart = new Date(now); wStart.setHours(0,0,0,0);
  wStart.setDate(now.getDate() - ((now.getDay()+6)%7) + (invWeekOffset*7));
  const wEnd = new Date(wStart); wEnd.setDate(wStart.getDate()+7);
  const wEndDisplay = new Date(wEnd); wEndDisplay.setDate(wEnd.getDate()-1);
  const isCurrentWeek = invWeekOffset === 0;
  const weekLabel = `${wStart.toLocaleDateString('en-IN',{day:'2-digit',month:'short'})} – ${wEndDisplay.toLocaleDateString('en-IN',{day:'2-digit',month:'short',year:'numeric'})}`;

  // Week options from earliest order
  const allWeekStarts = [];
  if (orders.length > 0) {
    const dates = orders.map(o=>new Date(o.deliveryDate)).filter(d=>!isNaN(d));
    const earliest = new Date(Math.min(...dates));
    const earliestMon = new Date(earliest);
    earliestMon.setDate(earliest.getDate()-((earliest.getDay()+6)%7)); earliestMon.setHours(0,0,0,0);
    const curMon = new Date(now); curMon.setDate(now.getDate()-((now.getDay()+6)%7)); curMon.setHours(0,0,0,0);
    let d = new Date(curMon);
    while (d >= earliestMon) { allWeekStarts.push(new Date(d)); d.setDate(d.getDate()-7); }
  }
  const weekOpts = allWeekStarts.map(ws => {
    const we = new Date(ws); we.setDate(ws.getDate()+6);
    const curMon = new Date(now); curMon.setDate(now.getDate()-((now.getDay()+6)%7)); curMon.setHours(0,0,0,0);
    const offset = Math.round((ws-curMon)/(7*24*60*60*1000));
    const lbl = `${ws.toLocaleDateString('en-IN',{day:'2-digit',month:'short'})} – ${we.toLocaleDateString('en-IN',{day:'2-digit',month:'short',year:'numeric'})}`;
    return `<option value="${offset}" ${offset===invWeekOffset?'selected':''}>${lbl}</option>`;
  }).join('');

  // Filter orders for this week by delivery date
  const weekOrders = orders.filter(o=>{
    const d = new Date(o.deliveryDate);
    return d >= wStart && d < wEnd;
  }).sort((a,b)=>a.deliveryDate.localeCompare(b.deliveryDate));

  if (weekOrders.length === 0) {
    return `
      <div style="display:flex;gap:8px;align-items:center;margin-bottom:20px;flex-wrap:wrap">
        <button class="btn btn-ghost" onclick="invWeekOffset--;_renderPage()" style="padding:6px 12px;font-size:16px">&#8249;</button>
        <select class="inp" style="width:210px;font-weight:600;font-size:13px" onchange="invWeekOffset=parseInt(this.value);_renderPage()">
          ${weekOpts||`<option value="0">${weekLabel}</option>`}
        </select>
        <button class="btn btn-ghost" onclick="invWeekOffset++;_renderPage()" style="padding:6px 12px;font-size:16px;${isCurrentWeek?'opacity:0.3;cursor:default':''}">&#8250;</button>
        ${!isCurrentWeek?`<button class="btn btn-ghost" style="font-size:11px;padding:5px 10px" onclick="invWeekOffset=0;_renderPage()">This Week</button>`:''}
      </div>
      <div class="empty">No orders for this week</div>`;
  }

  // Build invoice rows
  const rows = weekOrders.map(o => {
    const b = bars.find(x=>x.id===o.barId)||{barName:'Unknown'};
    const rc = rateCard[b.id] || {};
    const entity = rc.__entity__ || 'SAGA GYPSY BEER PROJECT';
    const isSaga = entity === 'SAGA GYPSY BEER PROJECT';
    const inv = invData[o.id] || {};
    const mrpDisc = Number(inv.mrpDiscount)||0;
    const svcDisc = Number(inv.svcDiscount)||0;

    // MRP invoice: roundup(134.4 * 1.02 * total litres)
    const totalLitres = o.items.reduce((s,i)=>s+(i.qty*i.size),0);
    const mrpGross = Math.ceil(MRP_PER_LITRE * 1.02 * totalLitres);
    const mrpFinal = mrpGross - mrpDisc;

    // Service invoice: service rate * total litres per beer (no GST added to gross)
    let svcGross = 0;
    let ratesMissing = false;
    o.items.forEach(item => {
      const r = rc[item.beer] || {};
      if (r.rate) {
        const svcRate = Number(r.rate) - MRP_PER_LITRE;
        svcGross += svcRate * item.qty * item.size;
      } else {
        ratesMissing = true;
      }
    });
    svcGross = parseFloat(svcGross.toFixed(2));

    // Final service = service amount - discount
    const svcFinal = parseFloat((svcGross - svcDisc).toFixed(2));

    // GST = Final Service - Net of GST
    const gstAmt = isSaga ? parseFloat((svcFinal - svcFinal/1.18).toFixed(2)) : 0;

    // Net of GST = Final Service / 1.18
    const netOfGST = isSaga ? parseFloat((svcFinal / 1.18).toFixed(2)) : null;

    const itemSummary = o.items.map(i=>`${i.qty}×${i.size}L ${i.beer}`).join(', ');

    const fmt2 = n => n.toLocaleString('en-IN', {minimumFractionDigits:2, maximumFractionDigits:2});

    return `<tr>
      <td>
        <div style="font-weight:600">${b.barName}</div>
        <div style="font-size:11px;color:var(--muted);margin-top:2px">${fmtDate(o.deliveryDate)} · ${itemSummary}</div>
        <div style="font-size:11px;color:var(--muted);margin-top:1px">${totalLitres}L · Invoice by <b>${entity}</b></div>
        ${ratesMissing?`<div style="font-size:11px;color:var(--red);margin-top:2px">⚠ Some beers missing rate card entry</div>`:''}
      </td>
      <td style="font-family:monospace;font-size:13px;text-align:right">₹${mrpGross.toLocaleString('en-IN')}</td>
      <td style="text-align:right">
        <input type="number" min="0" class="inp" style="width:90px;font-size:12px;padding:4px 8px;text-align:right"
          value="${mrpDisc||''}" placeholder="0"
          data-inv-mrpdisc="${o.id}">
      </td>
      <td style="font-family:monospace;font-size:13px;font-weight:700;text-align:right;color:${mrpFinal<0?'var(--red)':'var(--text)'}">
        ₹${mrpFinal.toLocaleString('en-IN')}
      </td>
      <td style="font-family:monospace;font-size:13px;text-align:right">₹${fmt2(svcGross)}</td>
      <td style="text-align:right">
        <input type="number" min="0" class="inp" style="width:90px;font-size:12px;padding:4px 8px;text-align:right"
          value="${svcDisc||''}" placeholder="0"
          data-inv-svcdisc="${o.id}">
      </td>
      <td style="font-family:monospace;font-size:13px;font-weight:700;text-align:right;color:${svcFinal<0?'var(--red)':'var(--text)'}">
        ₹${fmt2(svcFinal)}
      </td>
      <td style="font-family:monospace;font-size:13px;text-align:right;color:var(--muted)">
        ${isSaga ? `₹${fmt2(gstAmt)} <span style="font-size:10px">(18%)</span>` : '—'}
      </td>
      <td style="font-family:monospace;font-size:13px;font-weight:700;text-align:right">
        ${netOfGST !== null ? `₹${fmt2(netOfGST)}` : '—'}
      </td>
      <td>
        <button class="btn btn-primary btn-sm" onclick="saveInvRow('${o.id}')">Save</button>
      </td>
    </tr>`;
  }).join('');

  // Totals
  let totalMrpFinal=0, totalSvcFinal=0, totalGst=0, totalNetOfGST=0;
  weekOrders.forEach(o=>{
    const b = bars.find(x=>x.id===o.barId)||{};
    const rc = rateCard[b.id]||{};
    const entity = rc.__entity__||'SAGA GYPSY BEER PROJECT';
    const isSaga = entity==='SAGA GYPSY BEER PROJECT';
    const inv = invData[o.id]||{};
    const totalLitres = o.items.reduce((s,i)=>s+(i.qty*i.size),0);
    const mrpGross = Math.ceil(MRP_PER_LITRE*1.02*totalLitres);
    const mrpFinal = mrpGross-(Number(inv.mrpDiscount)||0);
    let svcGross=0;
    o.items.forEach(item=>{ const r=(rc[item.beer]||{}); if(r.rate) svcGross+=(Number(r.rate)-MRP_PER_LITRE)*item.qty*item.size; });
    svcGross = parseFloat(svcGross.toFixed(2));
    const svcFinal = parseFloat((svcGross-(Number(inv.svcDiscount)||0)).toFixed(2));
    const gst = isSaga ? parseFloat((svcFinal - svcFinal/1.18).toFixed(2)) : 0;
    const netOfGST = isSaga ? parseFloat((svcFinal/1.18).toFixed(2)) : svcFinal;
    totalMrpFinal+=mrpFinal; totalSvcFinal+=svcFinal; totalGst+=gst; totalNetOfGST+=netOfGST;
  });
  const fmt2tot = n => n.toLocaleString('en-IN',{minimumFractionDigits:2,maximumFractionDigits:2});

  return `
    <div style="display:flex;gap:8px;align-items:center;margin-bottom:20px;flex-wrap:wrap">
      <button class="btn btn-ghost" onclick="invWeekOffset--;_renderPage()" style="padding:6px 12px;font-size:16px">&#8249;</button>
      <select class="inp" style="width:210px;font-weight:600;font-size:13px" onchange="invWeekOffset=parseInt(this.value);_renderPage()">
        ${weekOpts||`<option value="0">${weekLabel}</option>`}
      </select>
      <button class="btn btn-ghost" onclick="invWeekOffset++;_renderPage()" style="padding:6px 12px;font-size:16px;${isCurrentWeek?'opacity:0.3;cursor:default':''}">&#8250;</button>
      ${!isCurrentWeek?`<button class="btn btn-ghost" style="font-size:11px;padding:5px 10px" onclick="invWeekOffset=0;_renderPage()">This Week</button>`:''}
      <div style="margin-left:auto;font-size:12px;color:var(--muted)">MRP = roundup(₹134.4 × 1.02 × litres) · SAGA service includes 18% GST</div>
    </div>
    <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px">
      <div class="card" style="padding:16px;text-align:center">
        <div style="font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:6px">MRP Total</div>
        <div style="font-size:20px;font-weight:700">₹${totalMrpFinal.toLocaleString('en-IN')}</div>
      </div>
      <div class="card" style="padding:16px;text-align:center">
        <div style="font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:6px">Service Total</div>
        <div style="font-size:20px;font-weight:700">₹${fmt2tot(totalSvcFinal)}</div>
      </div>
      <div class="card" style="padding:16px;text-align:center">
        <div style="font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:6px">GST Total</div>
        <div style="font-size:20px;font-weight:700">₹${fmt2tot(totalGst)}</div>
      </div>
      <div class="card" style="padding:16px;text-align:center">
        <div style="font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:6px">Net of GST</div>
        <div style="font-size:20px;font-weight:700">₹${fmt2tot(totalNetOfGST)}</div>
      </div>
    </div>
    <div class="card" style="padding:0">
      <div class="tbl-wrap">
        <table class="tbl">
          <thead><tr>
            <th>Bar / Order</th>
            <th style="text-align:right">MRP Amount</th>
            <th style="text-align:right">MRP Discount</th>
            <th style="text-align:right">Final MRP</th>
            <th style="text-align:right">Service Amount</th>
            <th style="text-align:right">Svc Discount</th>
            <th style="text-align:right">Final Service</th>
            <th style="text-align:right">GST (18%)</th>
            <th style="text-align:right">Net of GST</th>
            <th></th>
          </tr></thead>
          <tbody>${rows}</tbody>
        </table>
      </div>
    </div>`;
}

function saveInvRow(orderId) {
  const mrpInp = document.querySelector(`input[data-inv-mrpdisc="${orderId}"]`);
  const svcInp = document.querySelector(`input[data-inv-svcdisc="${orderId}"]`);
  if (!invData[orderId]) invData[orderId] = {};
  if (mrpInp) invData[orderId].mrpDiscount = Number(mrpInp.value)||0;
  if (svcInp) invData[orderId].svcDiscount = Number(svcInp.value)||0;
  saveInvData();
  _renderPage();
}

// ── Bar Registry ──────────────────────────────────────────────────────────
let barsSearch = '';
let showAddBar = false;
let showInactive = false;
let newBar = {barName:'',entity:'',area:'',licNo:'',licType:'FL3'};
let selectedBars = new Set();
let editBarId = null;
let editBarData = {};

function pageBars() {
  const activeBars   = bars.filter(b=>!b.inactive);
  const inactiveBars = bars.filter(b=>b.inactive);

  const searchFn = b =>
    b.barName.toLowerCase().includes(barsSearch.toLowerCase()) ||
    (b.area||'').toLowerCase().includes(barsSearch.toLowerCase());

  const filtered = (showInactive ? bars : activeBars).filter(searchFn).sort((a,b)=>a.barName.localeCompare(b.barName));

  const allFilteredIds = filtered.map(b=>b.id);
  const allSelected = allFilteredIds.length > 0 && allFilteredIds.every(id=>selectedBars.has(id));

  const rows = filtered.map(b=>{
    const checked = selectedBars.has(b.id);
    const isEditing = editBarId === b.id;

    if (isEditing) {
      return `<tr style="background:rgba(88,166,255,0.07)">
        <td style="width:36px"></td>
        <td colspan="6" style="padding:12px">
          <div class="grid2" style="margin-bottom:10px">
            ${[['barName','Bar Name *'],['entity','Legal Entity'],['area','Area'],['licNo','Licence No']].map(([k,l])=>`
              <div>
                <label class="lbl">${l}</label>
                <input class="inp" value="${(editBarData[k]||'').replace(/"/g,'&quot;')}" oninput="editBarData['${k}']=this.value">
              </div>`).join('')}
            <div>
              <label class="lbl">Licence Type</label>
              <select class="inp" onchange="editBarData.licType=this.value">
                ${['FL3','FLBR2','Form E'].map(t=>`<option ${(editBarData.licType||'FL3')===t?'selected':''}>${t}</option>`).join('')}
              </select>
            </div>
          </div>
          <div style="display:flex;gap:8px">
            <button class="btn btn-primary btn-sm" onclick="saveEditBar(${b.id})">Save</button>
            <button class="btn btn-ghost btn-sm" onclick="editBarId=null;renderPage()">Cancel</button>
          </div>
        </td>
      </tr>`;
    }

    return `<tr data-search='${b.barName} ${b.area||""}' style="background:${checked?'rgba(218,54,51,0.07)':b.inactive?'rgba(139,148,158,0.05)':''}">
      <td class="sticky-col" style="width:36px;text-align:center">
        <input type="checkbox" ${checked?'checked':''} onchange="toggleBarSelect(${b.id},this.checked)"
          style="width:15px;height:15px;cursor:pointer;accent-color:var(--red)">
      </td>
      <td class="sticky-col" style="font-weight:600;${b.inactive?'opacity:0.45':''}">
        ${b.barName}
        ${b.inactive?`<span style="font-size:10px;color:var(--muted);margin-left:6px;font-weight:400">INACTIVE</span>`:''}
      </td>
      <td style="font-size:12px;color:var(--muted);${b.inactive?'opacity:0.45':''}">${cleanEntity(b.entity)}</td>
      <td style="${b.inactive?'opacity:0.45':''}">${b.area}</td>
      <td style="font-family:monospace;${b.inactive?'opacity:0.45':''}">${b.licNo||'--'}</td>
      <td>${badge(b.licType, b.inactive?'#555':'#58A6FF')}</td>
      <td>
        <div style="display:flex;gap:6px">
          <button class="btn btn-ghost btn-sm" onclick="startEditBar(${b.id})">✎</button>
          <button class="btn btn-ghost btn-sm" style="color:${b.inactive?'var(--green)':'var(--orange)'}"
            onclick="toggleBarActive(${b.id})">${b.inactive?'Reactivate':'Deactivate'}</button>
        </div>
      </td>
    </tr>`;
  }).join('');

  const selCount = selectedBars.size;
  const bulkBar = selCount > 0 ? `
    <div style="display:flex;align-items:center;gap:12px;padding:10px 16px;background:rgba(218,54,51,0.1);border:1px solid rgba(218,54,51,0.3);border-radius:6px;margin-bottom:14px">
      <span style="font-size:12px;font-weight:600;color:var(--red)">${selCount} bar${selCount!==1?'s':''} selected</span>
      <button class="btn btn-danger btn-sm" onclick="deactivateSelectedBars()">Deactivate Selected</button>
      <button class="btn btn-ghost btn-sm" onclick="selectedBars.clear();renderPage()">Clear</button>
    </div>` : '';

  const addForm = showAddBar ? `
    <div class="card" style="margin-bottom:18px">
      <div class="section-title">New Bar</div>
      <div class="grid2">
        ${[['barName','Bar Name *'],['entity','Legal Entity'],['area','Area'],['licNo','Licence No']].map(([k,l])=>`
          <div>
            <label class="lbl">${l}</label>
            <input class="inp" id="nb-${k}" value="${newBar[k]||''}" oninput="newBar['${k}']=this.value">
          </div>`).join('')}
        <div>
          <label class="lbl">Licence Type</label>
          <select class="inp" id="nb-licType" onchange="newBar.licType=this.value">
            ${['FL3','FLBR2','Form E'].map(t=>`<option ${newBar.licType===t?'selected':''}>${t}</option>`).join('')}
          </select>
        </div>
      </div>
      <div style="margin-top:14px;display:flex;gap:10px">
        <button class="btn btn-primary" onclick="saveNewBar()">Save Bar</button>
        <button class="btn btn-ghost" onclick="showAddBar=false;renderPage()">Cancel</button>
      </div>
    </div>` : '';

  return `
    <div style="display:flex;gap:10px;margin-bottom:18px;flex-wrap:wrap;align-items:center">
      <input class="inp" id="bars-search-inp" placeholder="Search bars or area…" value="${barsSearch}" oninput="setBarsSearch(this.value)" style="width:260px">
      <button class="btn btn-primary" onclick="showAddBar=!showAddBar;renderPage()">${showAddBar?'Cancel':'+ Add Bar'}</button>
      <button class="btn btn-ghost" onclick="showInactive=!showInactive;renderPage()">
        ${showInactive?'Hide Inactive':'Show Inactive'} ${inactiveBars.length?`(${inactiveBars.length})`:''}
      </button>
      <span style="font-size:11px;color:var(--muted);margin-left:4px">${activeBars.length} active · ${inactiveBars.length} inactive</span>
    </div>
    ${addForm}
    ${bulkBar}
    <div class="card" style="padding:0">
      <div class="tbl-wrap">
        <table class="tbl">
          <thead><tr>
            <th style="width:36px;text-align:center">
              <input type="checkbox" ${allSelected?'checked':''} onchange="toggleAllBars(this.checked,${JSON.stringify(allFilteredIds)})"
                style="width:15px;height:15px;cursor:pointer;accent-color:var(--red)">
            </th>
            <th class="sticky-col" style="padding-left:14px"></th><th class="sticky-col">Bar</th><th>Legal Entity</th><th>Area</th><th>Lic No</th><th>Type</th><th></th>
          </tr></thead>
          <tbody id="bars-tbody">${rows}</tbody>
        </table>
      </div>
    </div>`;
}

function toggleBarSelect(id, checked) {
  if (checked) selectedBars.add(id); else selectedBars.delete(id);
  renderPage();
}

function toggleAllBars(checked, ids) {
  if (checked) ids.forEach(id=>selectedBars.add(id));
  else ids.forEach(id=>selectedBars.delete(id));
  renderPage();
}

function toggleBarActive(id) {
  const b = bars.find(x=>x.id===id);
  if (!b) return;
  const action = b.inactive ? 'reactivate' : 'deactivate';
  if (!confirm(`${action.charAt(0).toUpperCase()+action.slice(1)} "${b.barName}"?\n\n${b.inactive?'They will appear in the New Order dropdown again.':'They will be hidden from new orders but all historical data is preserved.'}`)) return;
  bars = bars.map(x=>x.id===id?{...x,inactive:!x.inactive}:x);
  saveBars();
  renderPage();
}

function deactivateSelectedBars() {
  const count = selectedBars.size;
  if (!count) return;
  const names = bars.filter(b=>selectedBars.has(b.id)).map(b=>b.barName).join('\n• ');
  if (!confirm(`Deactivate ${count} bar${count!==1?'s':''}?\n\n• ${names}\n\nHistorical orders will be preserved. You can reactivate them anytime.`)) return;
  bars = bars.map(b=>selectedBars.has(b.id)?{...b,inactive:true}:b);
  selectedBars.clear();
  saveBars();
  renderPage();
}

function saveNewBar() {
  if (!newBar.barName) { alert('Bar name is required.'); return; }
  bars.push({...newBar, id: Date.now(), inactive: false});
  saveBars();
  newBar = {barName:'',entity:'',area:'',licNo:'',licType:'FL3'};
  showAddBar = false;
  renderPage();
}

function startEditBar(id) {
  const b = bars.find(x=>x.id===id);
  if (!b) return;
  editBarId = id;
  editBarData = {...b};
  showAddBar = false;
  renderPage();
}

function saveEditBar(id) {
  if (!editBarData.barName) { alert('Bar name is required.'); return; }
  bars = bars.map(b=>b.id===id?{...b,...editBarData}:b);
  saveBars();
  editBarId = null;
  editBarData = {};
  renderPage();
}

// ── Transport Pass ────────────────────────────────────────────────────────
function showTP(orderId) {
  const o = orders.find(x=>x.id===orderId);
  if (!o) return;
  const b = bars.find(x=>x.id===o.barId)||{barName:'Unknown',entity:'',area:'',licNo:'',licType:''};
  const tot = o.items.reduce((s,i)=>s+(i.tpQty!==undefined?i.tpQty:i.qty),0);
  const totL = o.items.reduce((s,i)=>{ const q=i.tpQty!==undefined?i.tpQty:i.qty; return s+q*i.size; },0);

  const itemRows = o.items.map(i=>{
    const beer = BEERS.find(x=>x.code===i.beer)||{name:i.beer};
    const tpQ = i.tpQty!==undefined?i.tpQty:i.qty;
    return `<tr>
      <td style="border:1px solid #ccc;padding:7px 10px">${beer.name}</td>
      <td style="border:1px solid #ccc;padding:7px 10px">${i.size} Litre</td>
      <td style="border:1px solid #ccc;padding:7px 10px">${tpQ}</td>
      <td style="border:1px solid #ccc;padding:7px 10px">${tpQ*i.size}L</td>
    </tr>`;
  }).join('');

  const infoRows = [
    ['TP Date', fmtDate(o.createdAt)],
    ['Delivery Date', fmtDate(o.deliveryDate)],
    ['Consignee (Bar)', b.barName],
    ['Legal Entity', cleanEntity(b.entity)],
    ['Delivery Area', b.area],
    ['Licence No.', b.licNo||'--'],
    ['Licence Type', b.licType],
  ].map(([k,v])=>`<tr>
    <td style="border:1px solid #ddd;padding:6px 10px;background:#f9f9f9;font-weight:600;width:40%;font-size:12px">${k}</td>
    <td style="border:1px solid #ddd;padding:6px 10px;font-size:13px">${v}</td>
  </tr>`).join('');

  document.getElementById('modal-container').innerHTML = `
    <div class="modal-overlay" onclick="if(event.target===this)closeModal()">
      <div class="modal-box">
        <div id="tp-print-content">
          <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:4px">
            <div>
              <h1 style="font-size:20px;font-weight:700;margin:0;font-family:Arial">2 DOWN BREWING CO.</h1>
              <div style="font-size:11px;color:#666;letter-spacing:2px;margin-top:3px">TRANSPORT PASS</div>
            </div>
            <div style="text-align:right;font-size:11px;color:#666">
              TP #${orderId.slice(-6).toUpperCase()}<br>
              ${fmtDate(o.createdAt)}
            </div>
          </div>
          <hr style="margin:14px 0;border:none;border-top:2px solid #000">
          <table style="width:100%;border-collapse:collapse;margin-bottom:18px"><tbody>${infoRows}</tbody></table>
          <table style="width:100%;border-collapse:collapse;font-size:13px">
            <thead><tr>
              ${['Beer','Keg Size','Quantity','Total Volume'].map(h=>`<th style="border:1px solid #000;padding:8px 10px;background:#f0f0f0;text-align:left">${h}</th>`).join('')}
            </tr></thead>
            <tbody>
              ${itemRows}
              <tr>
                <td colspan="2" style="border:1px solid #ccc;padding:7px 10px;font-weight:700;text-align:right">TOTAL</td>
                <td style="border:1px solid #ccc;padding:7px 10px;font-weight:700">${tot}</td>
                <td style="border:1px solid #ccc;padding:7px 10px;font-weight:700">${totL}L</td>
              </tr>
            </tbody>
          </table>
          ${o.notes?`<div style="margin-top:14px;font-size:12px;color:#666"><b>Notes:</b> ${o.notes}</div>`:''}
          <div style="margin-top:44px;display:flex;justify-content:space-between">
            ${['Authorised Signatory<br>(2 Down Brewing Co.)','Driver / Vehicle','Receiver at Bar'].map(s=>`
              <div style="text-align:center;width:160px;border-top:1px solid #000;padding-top:8px;font-size:11px;color:#666">${s}</div>`).join('')}
          </div>
        </div>
        <div class="no-print" style="display:flex;gap:10px;margin-top:22px">
          <button class="btn btn-primary" onclick="printTP()" style="background:#000;color:#fff">🖨 Print / Save PDF</button>
          <button class="btn btn-ghost" onclick="closeModal()" style="background:#e0e0e0;color:#000">Close</button>
        </div>
      </div>
    </div>`;
}

function printTP() {
  const content = document.getElementById('tp-print-content').innerHTML;
  const w = window.open('','_blank','width=700,height=900');
  w.document.write(`<!DOCTYPE html><html><head><title>Transport Pass – 2 Down</title>
    <style>body{font-family:Arial,sans-serif;padding:32px;color:#000;max-width:680px;margin:0 auto}
    @media print{body{padding:16px}}</style>
    </head><body>${content}</body></html>`);
  w.document.close();
  w.focus();
  setTimeout(()=>w.print(), 400);
}

function closeModal() { document.getElementById('modal-container').innerHTML=''; }

// ── Events ────────────────────────────────────────────────────────────────
function bindEvents() {}

// ── Init ──────────────────────────────────────────────────────────────────
window.onerror = function(msg, src, line, col, err) {
  document.body.innerHTML = `<div style="padding:30px;font-family:monospace;background:#fff;color:#c00">
    <b>JS Error:</b><br>${msg}<br>Line: ${line}<br>${err ? err.stack : ''}
  </div>`;
};

document.addEventListener('DOMContentLoaded', () => {
  const el = document.getElementById('topbar-date');
  if (el) el.textContent = new Date().toLocaleDateString('en-IN',{weekday:'short',day:'2-digit',month:'short',year:'numeric'});
  loadData();
});
</script>
