  document.getElementById('modal-container').innerHTML = `
    <div class="modal-overlay" onclick="if(event.target===this)closeModal()">
      <div class="modal-box" style="max-width:420px">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
          <div style="font-size:16px;font-weight:700">Filter by Bar</div>
          <button onclick="closeModal()" style="background:none;border:none;font-size:24px;cursor:pointer;color:#999">×</button>
        </div>
        <div style="max-height:420px;overflow-y:auto;margin-bottom:14px">
          ${options || '<div class="empty">No bars with kegs out</div>'}
        </div>
        <div style="display:flex;gap:8px;justify-content:flex-end">
          <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
          <button class="btn btn-primary" onclick="
            const sel=document.querySelector('input[name=kgb-bar]:checked');
            if(!sel){alert('Please select a bar.');return;}
            showKegsByBarResult(Number(sel.value));
          ">View Kegs</button>
        </div>
      </div>
    </div>`;
}

function showKegsByBarResult(barId) {
  const bar = bars.find(b => b.id === barId);
  if (!bar) return;

  const kegDates = {...HISTORICAL_KEG_DATES};
  orders.forEach(o => {
    (o.assignedKegs||[]).forEach(a => {
      if (!kegDates[a.kegNo] || o.deliveryDate > kegDates[a.kegNo])
        kegDates[a.kegNo] = o.deliveryDate;
    });
  });

  const barKegs = kegs.filter(k => k.location === bar.barName)
    .sort((a,b) => (a.kegNo||'').localeCompare(b.kegNo||'', undefined, {numeric:true, sensitivity:'base'}));

  const rows = barKegs.map((k, i) => `
    <tr style="${k.missing?'background:rgba(220,38,38,0.05)':''}">
      <td style="text-align:center;color:var(--muted);font-size:12px">${i+1}</td>
      <td style="font-family:monospace;font-weight:700;${k.missing?'color:var(--red)':''}">
        ${k.kegNo}${k.missing?` <span style="font-size:9px;background:#fee2e2;color:var(--red);padding:1px 4px;border-radius:3px">MISSING</span>`:''}
      </td>
      <td style="font-size:13px">${k.size}L</td>
      <td style="font-size:13px;color:${k.beer==='Empty'?'var(--muted)':'var(--text)'}">${k.beer}</td>
      <td style="font-size:12px;color:var(--muted)">${kegDates[k.kegNo]?fmtDate(kegDates[k.kegNo]):'—'}</td>
    </tr>`).join('');

  const outCount = barKegs.filter(k=>!k.missing).length;
  const missingCount = barKegs.filter(k=>k.missing).length;

  document.getElementById('modal-container').innerHTML = `
    <div class="modal-overlay" onclick="if(event.target===this)closeModal()">
      <div class="modal-box" style="max-width:520px">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:16px">
          <div>
            <div style="font-size:18px;font-weight:700">${bar.barName}</div>
            <div style="font-size:12px;color:var(--muted);margin-top:3px">
              ${bar.area} · ${outCount} keg${outCount!==1?'s':''} out${missingCount>0?` · <span style="color:var(--red)">${missingCount} missing</span>`:''}
            </div>
          </div>
          <div style="display:flex;align-items:center;gap:8px">
            <button class="btn btn-ghost btn-sm" onclick="openKegTable(${barId}, 'bar')">⎙ View Table</button>
            <button onclick="closeModal()" style="background:none;border:none;font-size:24px;cursor:pointer;color:#999">×</button>
          </div>
        </div>
        <div style="max-height:460px;overflow-y:auto">
          <table class="tbl" style="font-size:13px">
            <thead><tr><th>#</th><th>Keg No.</th><th>Size</th><th>Beer</th><th>Delivered</th></tr></thead>
            <tbody>${rows||'<tr><td colspan="5" class="empty">No kegs at this bar</td></tr>'}</tbody>
          </table>
        </div>
        <div style="margin-top:14px;display:flex;justify-content:space-between">
          <button onclick="showKegsByBar()" class="btn btn-ghost btn-sm">← Back</button>
          <button onclick="closeModal()" class="btn btn-primary">Close</button>
        </div>
      </div>
    </div>`;
}

function showBarChecklist() {
  const barsWithKegs = bars.filter(b => !b.inactive && kegs.some(k => k.location === b.barName && !k.missing))
    .sort((a,b) => a.barName.localeCompare(b.barName));

  const options = barsWithKegs.map(b => {
    const count = kegs.filter(k => k.location === b.barName && !k.missing).length;
    return `<label style="display:flex;align-items:center;gap:10px;padding:10px 14px;border:1px solid var(--border);border-radius:8px;cursor:pointer;margin-bottom:8px">
      <input type="radio" name="checklist-bar" value="${b.id}" style="accent-color:var(--accent)">
      <span style="font-weight:600;flex:1">${b.barName}</span>
      <span style="font-size:12px;color:var(--muted)">${count} keg${count!==1?'s':''}</span>
    </label>`;
  }).join('');

  document.getElementById('modal-container').innerHTML = `
    <div class="modal-overlay" onclick="if(event.target===this)closeModal()">
      <div class="modal-box" style="max-width:420px">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
          <div style="font-size:16px;font-weight:700">Bar Checklist</div>
          <button onclick="closeModal()" style="background:none;border:none;font-size:24px;cursor:pointer;color:#999">×</button>
        </div>
        <div style="font-size:13px;color:var(--muted);margin-bottom:14px">Select a bar to view its kegs:</div>
        <div style="max-height:400px;overflow-y:auto">${options || '<div class="empty">No bars with kegs out</div>'}</div>
        <div style="display:flex;gap:10px;margin-top:16px;justify-content:flex-end">
          <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
          <button class="btn btn-primary" onclick="doBarChecklist()">View Checklist</button>
        </div>
      </div>
    </div>`;
}

function doBarChecklist() {
  const sel = document.querySelector('input[name="checklist-bar"]:checked');
  if (!sel) { alert('Please select a bar.'); return; }
  const barId = Number(sel.value);
  const bar = bars.find(b => b.id === barId);
  if (!bar) return;
  closeModal();

  // Include both regular and missing kegs at this bar
  const barKegs = kegs
    .filter(k => k.location === bar.barName)
    .sort((a,b) => (a.kegNo||'').localeCompare(b.kegNo||'', undefined, {numeric:true, sensitivity:'base'}));

  const kegDeliveryMap = {...HISTORICAL_KEG_DATES};
  orders.forEach(o => {
    (o.assignedKegs||[]).forEach(a => {
      if (!kegDeliveryMap[a.kegNo] || o.deliveryDate > kegDeliveryMap[a.kegNo])
        kegDeliveryMap[a.kegNo] = o.deliveryDate;
    });
  });

  const rows = barKegs.map((k, idx) => `
    <tr style="${k.missing?'background:rgba(220,38,38,0.05)':''}">
      <td style="text-align:center;color:var(--muted);font-size:12px">${idx+1}</td>
      <td style="font-family:monospace;font-weight:700;${k.missing?'color:var(--red)':''}">${k.kegNo}${k.missing?` <span style="font-size:9px;background:#fee2e2;color:var(--red);padding:1px 4px;border-radius:3px">MISSING</span>`:''}</td>
      <td style="font-size:13px">${k.size}L</td>
      <td style="font-size:13px">${k.beer !== 'Empty' ? k.beer : '<span style="color:var(--muted)">—</span>'}</td>
      <td style="font-size:12px;color:var(--muted)">${kegDeliveryMap[k.kegNo] ? fmtDate(kegDeliveryMap[k.kegNo]) : '—'}</td>
      <td style="text-align:center">
        <input type="checkbox" class="checklist-cb" data-keg="${k.kegNo}" style="width:16px;height:16px;accent-color:var(--green);cursor:pointer">
      </td>
    </tr>`).join('');

  const regularCount = barKegs.filter(k=>!k.missing).length;
  const missingCount = barKegs.filter(k=>k.missing).length;

  document.getElementById('modal-container').innerHTML = `
    <div class="modal-overlay" onclick="if(event.target===this)closeModal()">
      <div class="modal-box" style="max-width:540px">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:16px">
          <div>
            <div style="font-size:18px;font-weight:700">${bar.barName}</div>
            <div style="font-size:12px;color:var(--muted);margin-top:3px">
              ${bar.area} · ${regularCount} keg${regularCount!==1?'s':''} out${missingCount>0?` · <span style="color:var(--red)">${missingCount} missing</span>`:''}
            </div>
          </div>
          <button onclick="closeModal()" style="background:none;border:none;font-size:24px;cursor:pointer;color:#999">×</button>
        </div>
        <div style="max-height:380px;overflow-y:auto">
          <table class="tbl" style="font-size:13px">
            <thead><tr>
              <th style="width:30px">#</th>
              <th>Keg No.</th>
              <th>Size</th>
              <th>Beer</th>
              <th>Delivered</th>
              <th style="text-align:center">✓</th>
            </tr></thead>
            <tbody>${rows}</tbody>
          </table>
        </div>
        <div style="margin-top:12px">
          <label class="lbl">Notes</label>
          <textarea id="checklist-notes" class="inp" style="width:100%;height:70px;resize:vertical;font-size:13px" placeholder="Add any notes about this visit…"></textarea>
        </div>
        <div style="margin-top:14px;display:flex;justify-content:space-between;align-items:center">
          <button onclick="showBarChecklist()" class="btn btn-ghost btn-sm">← Back</button>
          <button onclick="completeBarChecklist('${bar.barName}',${barKegs.length})" class="btn btn-primary">Done</button>
        </div>
      </div>
    </div>`;
}

function completeBarChecklist(barName, totalKegs) {
  const checked = [...document.querySelectorAll('.checklist-cb:checked')].map(cb => cb.dataset.keg);
  const unchecked = [...document.querySelectorAll('.checklist-cb:not(:checked)')].map(cb => cb.dataset.keg);
  const notes = document.getElementById('checklist-notes')?.value?.trim() || '';
  let details = `${barName} · ${checked.length}/${totalKegs} kegs verified`;
  if (unchecked.length > 0) details += ` · Not found: ${unchecked.join(', ')}`;
  if (notes) details += ` · Notes: ${notes}`;
  logActivity('Bar Checklist Done', details);
  closeModal();
}

function filterReturnSuggestions(val) {
  const box = document.getElementById('return-suggestions');
  if (!box) return;
  const q = val.trim().toLowerCase();
  if (!q) { box.style.display = 'none'; return; }

  const kegsOut = kegs.filter(k => k.location !== 'Brewery' && !k.missing);
  const matches = kegsOut
    .filter(k => !returnSelected.has(k.kegNo) && k.kegNo.toLowerCase().includes(q))
    .slice(0, 10);

  if (matches.length === 0) { box.style.display = 'none'; return; }

  box.innerHTML = matches.map(k => `
    <div onclick="selectReturnKeg('${k.kegNo}')"
      style="padding:10px 14px;cursor:pointer;border-bottom:1px solid var(--border);font-size:13px"
      onmouseover="this.style.background='var(--hover)'" onmouseout="this.style.background=''">
      <span style="font-weight:700;font-family:monospace">${k.kegNo}</span>
      <span style="color:var(--muted);margin-left:8px">${k.size}L — ${k.location}</span>
    </div>`).join('');
  box.style.display = 'block';
}

function selectReturnKeg(kegNo) {
  const inp = document.getElementById('return-keg-inp');
  if (inp) inp.value = kegNo;
  closeReturnSuggestions();
  addReturnKeg();
}

function closeReturnSuggestions() {
  const box = document.getElementById('return-suggestions');
  if (box) box.style.display = 'none';
}

function addReturnKeg() {
  const inp = document.getElementById('return-keg-inp');
  if (!inp) return;
  // Match by keg no — extract just the keg number if user picked from datalist (format "M5 — 20L — Bonobo")
  const raw = inp.value.trim();
  const kegNo = raw.split('—')[0].trim() || raw;
  if (!kegNo) return;
  const k = kegs.find(x => x.kegNo.toLowerCase() === kegNo.toLowerCase());
  if (!k) { alert(`Keg "${kegNo}" not found. Check the keg number and try again.`); return; }
  if (k.location === 'Brewery') { alert(`Keg ${kegNo} is already at the brewery.`); return; }
  returnSelected.add(k.kegNo);
  inp.value = '';
  renderPage();
}

function toggleReturnKeg(kegNo, add) {
  if (add) returnSelected.add(kegNo);
  else returnSelected.delete(kegNo);
  renderPage();
}

function returnKegs() {
  if (returnSelected.size === 0) return;
  const kegNos = [...returnSelected];
  kegs = kegs.map(k => {
    if (returnSelected.has(k.kegNo)) {
      logKegEvent(k.kegNo, 'Returned to Brewery', { location: 'Brewery', beer: 'Empty' });
      return { ...k, location: 'Brewery', beer: 'Empty' };
    }
    return k;
  });
  logActivity('Kegs Returned', `${kegNos.join(', ')} → Brewery`);
  returnSelected.clear();
  saveKegs();
  showToast();
  renderPage();
}

function addBreweryBeer() {
  const batch = document.getElementById('batch-input')?.value?.trim() || newBatch.batch.trim();
  if (!batch) { alert('Please enter a batch number.'); return; }
  breweryBeers.push({ beer: newBatch.beer, batch });
  newBatch = { beer: 'BB', batch: '' };
  saveBreweryBeers();
  renderPage();
}

function removeBreweryBeer(idx) {
  breweryBeers.splice(idx, 1);
  saveBreweryBeers();
  renderPage();
}

function updateKegBeer(kegNo, beer) {
  const k = kegs.find(x=>x.kegNo===kegNo);
  if (!k) return;
  k.beer = beer.trim() || 'Empty';
  saveKegs();
}

function updateKegLocation(kegNo, newLocation) {
  const k = kegs.find(x=>x.kegNo===kegNo);
  if (!k || k.location === newLocation) return;
  const prevLocation = k.location;
  k.location = newLocation;
  if (newLocation === 'Brewery') {
    k.beer = 'Empty';
    logKegEvent(kegNo, 'Returned to Brewery', { location: 'Brewery', beer: 'Empty', from: prevLocation });
  } else {
    logKegEvent(kegNo, 'Location Updated', { location: newLocation, beer: k.beer, from: prevLocation });
  }
  saveKegs();
  renderPage();
}

function toggleMissing(kegNo) {
  const k = kegs.find(x=>x.kegNo===kegNo);
  if (!k) return;
  k.missing = !k.missing;
  logKegEvent(kegNo, k.missing ? 'Marked Missing' : 'Found', { location: k.location });
  logActivity(k.missing ? 'Keg Marked Missing' : 'Keg Found', `${kegNo} · ${k.location}`);
  saveKegs();
  renderPage();
}

function showKegHistory(kegNo) {
  const k = kegs.find(x=>x.kegNo===kegNo);
  if (!k) return;
  const history = (kegHistory[kegNo] || []).slice().reverse();

  const eventIcon = { 'Dispatched':'🚚','Returned to Brewery':'🏭','Location Updated':'📍','Marked Missing':'⚠️','Found':'✓' };
  const eventColor = { 'Dispatched':'#E87C3E','Returned to Brewery':'#16A34A','Location Updated':'#2563EB','Marked Missing':'#DC2626','Found':'#16A34A' };

  const historyRows = history.length > 0
    ? history.map(h => `
        <div style="display:flex;gap:14px;padding:12px 0;border-bottom:1px solid #f0f0f0">
          <div style="font-size:18px;min-width:26px;text-align:center;padding-top:2px">${eventIcon[h.event]||'•'}</div>
          <div style="flex:1">
            <div style="font-weight:700;font-size:14px;color:${eventColor[h.event]||'#666'}">${h.event}</div>
            <div style="font-size:12px;color:#666;margin-top:3px;display:flex;flex-wrap:wrap;gap:10px">
              ${h.location ? `<span>Location: <b style="color:#000">${h.location}</b></span>` : ''}
              ${h.beer && h.beer !== 'Empty' ? `<span>Beer: <b style="color:#000">${h.beer}</b></span>` : ''}
              ${h.batch ? `<span>Batch: <b style="color:#000">${h.batch}</b></span>` : ''}
              ${h.deliveryDate ? `<span>Delivery: <b style="color:#000">${fmtDate(h.deliveryDate)}</b></span>` : ''}
              ${h.from ? `<span>From: <b style="color:#000">${h.from}</b></span>` : ''}
            </div>
            <div style="font-size:11px;color:#999;margin-top:4px">${new Date(h.date).toLocaleString('en-IN',{day:'2-digit',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'})}</div>
          </div>
        </div>`).join('')
    : `<div style="color:#999;font-size:13px;padding:24px 0;text-align:center">No history recorded yet.<br><span style="font-size:12px">Events will appear here when this keg is dispatched or returned.</span></div>`;

  const beerInfo = BEERS.find(b=>b.code===k.beer);

  document.getElementById('modal-container').innerHTML = `
    <div class="modal-overlay" onclick="if(event.target===this)closeModal()">
      <div class="modal-box" style="max-width:480px">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:18px">
          <div>
            <div style="font-size:22px;font-weight:700;font-family:monospace;color:#000">${kegNo}</div>
            <div style="font-size:13px;color:#666;margin-top:5px;display:flex;flex-wrap:wrap;gap:8px;align-items:center">
              <span>${k.size}L</span>
              <span>·</span>
              <span>${k.make}</span>
              <span>·</span>
              <span style="font-weight:600;color:${k.location==='Brewery'?'#16A34A':'#000'}">${k.location}</span>
              ${k.beer && k.beer !== 'Empty' && beerInfo ? `<span>·</span><span style="background:${beerInfo.color}22;color:${beerInfo.color};padding:1px 8px;border-radius:4px;font-size:11px;font-weight:700">${k.beer}</span>` : ''}
              ${k.missing ? `<span style="background:#fee2e2;color:#DC2626;padding:1px 8px;border-radius:4px;font-size:11px;font-weight:700">MISSING</span>` : ''}
            </div>
          </div>
          <button onclick="closeModal()" style="background:none;border:none;font-size:24px;cursor:pointer;color:#999;line-height:1;padding:0">&times;</button>
        </div>
        <div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:#999;margin-bottom:10px">Keg History &nbsp;(${history.length} events)</div>
        <div style="max-height:400px;overflow-y:auto">${historyRows}</div>
        <div style="margin-top:16px;text-align:right">
          <button onclick="closeModal()" style="background:#e0e0e0;border:none;padding:8px 20px;border-radius:6px;font-weight:600;cursor:pointer;font-size:13px">Close</button>
        </div>
      </div>
    </div>`;
}

// ── Beers Tab ─────────────────────────────────────────────────────────────
let newBatchBeer = ''; // tracks which beer the inline add form is for
let editingBatchIdx = null; // tracks which batch is being edited
let consumedFilter = 'all'; // filter for consumed batches
let beersSubTab = 'active'; // 'active' or 'consumed'

function pageBeers() {
  const beerRows = BEERS.map((b, i) => {
    const batches = breweryBeers.filter(bb => bb&&bb.beer === b.code);
    const activeBatches = batches.filter(bb => !bb.inactive);
    const totalLitres = activeBatches.reduce((s, bb) => s + (Number(bb.litres)||0), 0);

    const activeBatchRows = activeBatches.map((bb) => {
          const globalIdx = breweryBeers.findIndex(x => x.beer === b.code && x.batch === bb.batch);
          return `<tr style="background:var(--bg)">
            <td style="padding:8px 14px;font-size:12px" colspan="2"></td>
            <td style="padding:8px 14px;font-size:13px;font-family:monospace;font-weight:600;cursor:pointer;color:var(--accent);text-decoration:underline"
              onclick="showBatchHistory('${b.code}','${bb.batch}')">${bb.batch}</td>
            <td style="padding:8px 14px">
              <div style="display:flex;align-items:center;gap:8px">
                <input type="number" min="0" class="inp" style="width:100px;padding:5px 8px;font-size:13px;font-weight:600;color:var(--orange)"
                  value="${bb.litres||0}"
                  onchange="updateBatchLitres(${globalIdx}, this.value)"
                  title="Edit litres">
                <span style="font-size:12px;color:var(--muted)">L</span>
              </div>
            </td>
            <td style="padding:8px 14px">
              <button class="btn btn-danger btn-sm" onclick="toggleBatchActive(${globalIdx})">Deactivate</button>
            </td>
          </tr>`;
        }).join('');

    const consumedBatches = batches.filter(bb => bb.inactive || Number(bb.litres) === 0);
    const consumedBatchRows = consumedBatches.length > 0
      ? `<tr style="background:var(--hover)">
          <td colspan="5" style="padding:6px 14px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:var(--muted)">
            Consumed Batches
          </td>
        </tr>` +
        consumedBatches.map((bb) => {
          const globalIdx = breweryBeers.findIndex(x => x.beer === b.code && x.batch === bb.batch);
          return `<tr style="background:var(--bg);opacity:0.55">
            <td style="padding:8px 14px;font-size:12px" colspan="2"></td>
            <td style="padding:8px 14px;font-size:13px;font-family:monospace;font-weight:600;cursor:pointer;color:var(--muted);text-decoration:underline"
              onclick="showBatchHistory('${b.code}','${bb.batch}')">${bb.batch}</td>
            <td style="padding:8px 14px;font-size:13px;color:var(--muted)">Consumed</td>
            <td style="padding:8px 14px">
              <button class="btn btn-ghost btn-sm" style="color:var(--green);border-color:var(--green)"
                onclick="toggleBatchActive(${globalIdx})">Activate</button>
            </td>
          </tr>`;
        }).join('')
      : '';

    const batchRows = activeBatchRows + consumedBatchRows;

    const showAddForm = newBatchBeer === b.code;
    const isInactiveBeer = b.inactive;

    return `<tr style="border-bottom:${batches.length>0||showAddForm?'none':''};${isInactiveBeer?'opacity:0.5':''}">
      <td class="sticky-col" style="font-size:14px;font-weight:600">${b.name}</td>
      <td style="font-weight:700;font-size:14px">${badge(b.code,'#888')}</td>
      <td style="font-size:13px;color:var(--muted)">
        ${activeBatches.length > 0 ? `${activeBatches.length} active batch${activeBatches.length!==1?'es':''}` : '<span style="color:var(--muted)">No active batches</span>'}
      </td>
      <td style="font-weight:700;color:var(--accent)">${totalLitres > 0 ? totalLitres+'L' : '--'}</td>
      <td>
        <div style="display:flex;gap:6px;flex-wrap:wrap">
          ${!isInactiveBeer ? `<button class="btn btn-ghost btn-sm" onclick="newBatchBeer=newBatchBeer==='${b.code}'?'':'${b.code}';renderPage()">+ Batch</button>` : ''}
          ${BEERS.length > 1
            ? `<button class="btn btn-sm ${isInactiveBeer?'btn-ghost':'btn-danger'}"
                style="${isInactiveBeer?'color:var(--green);border-color:var(--green)':''}"
                onclick="toggleBeerActive(${i})">${isInactiveBeer?'Activate':'Deactivate'}</button>`
            : ''}
        </div>
      </td>
    </tr>
    ${batchRows}
    ${showAddForm ? `<tr style="background:var(--accent-bg);border-bottom:2px solid rgba(212,130,26,0.2)">
      <td colspan="5" style="padding:12px 14px">
        <div style="display:flex;gap:10px;align-items:flex-end;flex-wrap:wrap">
          <div>
            <label class="lbl">Batch Number</label>
            <input id="new-batch-no-${b.code}" class="inp" style="width:160px" placeholder="e.g. BB-2025-04">
          </div>
          <div>
            <label class="lbl">Brew Date</label>
            <input id="new-batch-brewdate-${b.code}" class="inp" style="width:150px" type="date">
          </div>
          <div>
            <label class="lbl">Quantity (Litres)</label>
            <input id="new-batch-litres-${b.code}" class="inp" style="width:120px" type="number" min="0" placeholder="e.g. 500">
          </div>
          <button class="btn btn-primary" onclick="saveBatchForBeer('${b.code}')">Save</button>
          <button class="btn btn-ghost" onclick="newBatchBeer='';renderPage()">Cancel</button>
        </div>
      </td>
    </tr>` : ''}`;
  }).join('');

  // Sub-tab toggle UI
  const subTabBar = `
    <div style="display:flex;gap:2px;background:var(--hover);border-radius:8px;padding:3px;margin-bottom:20px;width:fit-content">
      <button class="btn btn-sm ${beersSubTab==='active'?'btn-primary':'btn-ghost'}"
        onclick="beersSubTab='active';renderPage()" style="border:none;padding:7px 20px;font-size:13px">
        Active Batches
      </button>
      <button class="btn btn-sm ${beersSubTab==='consumed'?'btn-primary':'btn-ghost'}"
        onclick="beersSubTab='consumed';renderPage()" style="border:none;padding:7px 20px;font-size:13px">
        Consumed Batches
      </button>
    </div>`;

  if (beersSubTab === 'active') {
    return `
      <div style="max-width:820px">
        ${subTabBar}
        <div class="card">
          <div class="tbl-wrap">
            <table class="tbl">
              <thead><tr><th class="sticky-col">Name</th><th>Code</th><th>Batch</th><th>Litres</th><th></th></tr></thead>

                ${BEERS.filter(b => !b.inactive).map((b, i) => {
                  const batches = breweryBeers.filter(bb => bb&&bb.beer === b.code);
                  const activeBatches = batches.filter(bb => !bb.inactive && Number(bb.litres) > 0);
                  const showAddForm = newBatchBeer === b.code;
                  const isInactiveBeer = b.inactive;

                  const beerHeader = `<tr style="${isInactiveBeer?'opacity:0.5':''}">
                    <td class="sticky-col" style="font-size:13px;font-weight:600">${b.name}</td>
                    <td>${badge(b.code,'#888')}</td>
                    <td colspan="2" style="font-size:12px;color:var(--muted)">${activeBatches.length > 0 ? activeBatches.length+' batch'+(activeBatches.length!==1?'es':'') : 'No active batches'}</td>
                    <td>
                      <div style="display:flex;gap:4px;flex-wrap:wrap">
                        ${!isInactiveBeer ? `<button class="btn btn-ghost btn-sm" onclick="newBatchBeer=newBatchBeer==='${b.code}'?'':'${b.code}';renderPage()">+ Batch</button>` : ''}
                        ${BEERS.length > 1 ? `<button class="btn btn-sm ${isInactiveBeer?'btn-ghost':'btn-danger'}" style="${isInactiveBeer?'color:var(--green);border-color:var(--green)':''}" onclick="toggleBeerActive(${i})">${isInactiveBeer?'Activate':'Deactivate'}</button>` : ''}
                      </div>
                    </td>
                  </tr>`;

                  const batchRows = activeBatches.map(bb => {
                    const globalIdx = breweryBeers.findIndex(x => x.beer === b.code && x.batch === bb.batch);
                    return `<tr style="background:var(--bg)">
                      <td style="padding:6px 14px" colspan="2"></td>
                      <td style="padding:6px 14px;font-family:monospace;font-size:13px;font-weight:600;cursor:pointer;color:var(--accent);text-decoration:underline"
                        onclick="showBatchHistory('${b.code}','${bb.batch}')">
                        ${bb.batch}
                      </td>
                      <td style="padding:6px 14px">
                        ${(() => {
                          // Calculate dispatched litres from live orders
                          let dispatched = 0;
                          orders.forEach(o => {
                            (o.assignedKegs||[]).forEach(a => {
                              const fills = a.fills && a.fills.length > 0 ? a.fills
                                : (a.batch == bb.batch && a.beer === b.code ? [{beer:a.beer,batch:a.batch,litres:a.kegSize||0}] : []);
                              fills.forEach(f => { if(f.beer===b.code && f.batch==bb.batch) dispatched += Number(f.litres)||0; });
                            });
                          });
                          // Also count historical deliveries
                          const histKey = b.code + bb.batch;
                          (HISTORICAL_BATCH_DELIVERIES[histKey]||[]).forEach(h => dispatched += Number(h.litres)||0);
                          const brewed = Number(bb.litres)||0;
                          const remaining = Math.max(0, brewed - dispatched);
                          return `<span style="font-size:13px;font-weight:600;color:var(--orange)">${remaining}L</span>
                          <span style="font-size:11px;color:var(--muted);margin-left:4px">of ${brewed}L</span>`;
                        })()}
                      </td>
                      <td style="padding:6px 14px">
                        <div style="display:flex;gap:6px">
                          <button class="btn btn-ghost btn-sm" onclick="editBatchLitres(${globalIdx})" title="Edit litres">✎</button>
                          <button class="btn btn-danger btn-sm" onclick="toggleBatchActive(${globalIdx})">Deactivate</button>
                        </div>
                      </td>
                    </tr>` + (editingBatchIdx === globalIdx ? `<tr style="background:var(--accent-bg)">
                      <td colspan="5" style="padding:10px 14px">
                        <div style="display:flex;gap:8px;align-items:flex-end;flex-wrap:wrap">
                          <div><label class="lbl">Batch No.</label>
                            <input class="inp" style="width:110px" value="${bb.batch}" readonly></div>
                          <div><label class="lbl">Brew Date</label>
                            <input id="edit-batch-brewdate" class="inp" style="width:150px" type="date" value="${bb.brewDate||''}"></div>
                          <div><label class="lbl">Litres Brewed</label>
                            <input id="edit-batch-litres" class="inp" style="width:90px" type="number" min="0" value="${bb.litres||0}"></div>
                          <button class="btn btn-primary btn-sm" onclick="saveEditBatch(${globalIdx})">Save</button>
                          <button class="btn btn-ghost btn-sm" onclick="editingBatchIdx=null;renderPage()">Cancel</button>
                        </div>
                      </td>
                    </tr>` : '');
                  }).join('');

                  const addForm = showAddForm ? `<tr style="background:var(--accent-bg)">
                    <td colspan="5" style="padding:10px 14px">
                      <div style="display:flex;gap:8px;align-items:flex-end;flex-wrap:wrap">
                        <div><label class="lbl">Batch No.</label>
                          <input id="new-batch-no-${b.code}" class="inp" style="width:130px" placeholder="e.g. 51"></div>
                      <div><label class="lbl">Brew Date</label>
                        <input id="new-batch-brewdate-${b.code}" class="inp" style="width:140px" type="date"></div>
                        <div><label class="lbl">Litres</label>
                          <input id="new-batch-litres-${b.code}" class="inp" style="width:90px" type="number" min="0" placeholder="500"></div>
                        <button class="btn btn-primary btn-sm" onclick="saveBatchForBeer('${b.code}')">Save</button>
                        <button class="btn btn-ghost btn-sm" onclick="newBatchBeer='';renderPage()">Cancel</button>
                      </div>
                    </td>
                  </tr>` : '';

                  return beerHeader + batchRows + addForm;
                }).join('')}
              </tbody>
            </table>
          </div>
          <div style="display:flex;gap:10px;align-items:flex-end;margin-top:16px;padding-top:14px;border-top:1px solid var(--border);flex-wrap:wrap">
            <div><label class="lbl">Beer Code</label>
              <input id="new-beer-code" class="inp" style="width:90px;text-transform:uppercase" placeholder="e.g. IPA" maxlength="6"
                value="${newBeer.code}" oninput="newBeer.code=this.value.toUpperCase()"></div>
            <div><label class="lbl">Beer Name</label>
              <input id="new-beer-name" class="inp" style="width:180px" placeholder="e.g. India Pale Ale"
                value="${newBeer.name}" oninput="newBeer.name=this.value"></div>
            <button class="btn btn-primary" onclick="addBeer()">+ Add Beer</button>
          </div>
          ${BEERS.some(b => b.inactive) ? `
          <div style="margin-top:16px;padding-top:14px;border-top:1px solid var(--border)">
            <div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:var(--muted);margin-bottom:10px">Deactivated Beers</div>
            <div style="display:flex;flex-wrap:wrap;gap:8px">
              ${BEERS.filter(b=>b.inactive).map((b,i) => {
                const realIdx = BEERS.findIndex(x=>x.code===b.code);
                return `<div style="display:flex;align-items:center;gap:8px;padding:7px 12px;background:var(--hover);border-radius:8px;opacity:0.6">
                  ${badge(b.code,'#888')}
                  <span style="font-size:13px;color:var(--muted)">${b.name}</span>
                  <button class="btn btn-ghost btn-sm" style="color:var(--green);border-color:var(--green)" onclick="toggleBeerActive(${realIdx})">Activate</button>
                </div>`;
              }).join('')}
            </div>
          </div>` : ''}
        </div>
      </div>`;
  }

  // Consumed sub-tab
  return `
    <div style="max-width:620px">
      ${subTabBar}
      <div class="card">
        <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px">
          <button class="btn btn-sm ${consumedFilter==='all'?'btn-primary':'btn-ghost'}" onclick="consumedFilter='all';renderPage()">All</button>
          ${BEERS.map(b=>`<button class="btn btn-sm ${consumedFilter===b.code?'btn-primary':'btn-ghost'}" onclick="consumedFilter='${b.code}';renderPage()">${b.code}</button>`).join('')}
        </div>
        <div class="tbl-wrap">
          <table class="tbl">
            <thead><tr><th>Beer</th><th>Batch</th><th></th></tr></thead>
            <tbody>
              ${(() => {
                const consumed = breweryBeers
                  .filter(bb => (bb.inactive || Number(bb.litres) === 0) && (consumedFilter === 'all' || bb.beer === consumedFilter));
                if (consumed.length === 0) return `<tr><td colspan="3" class="empty">${consumedFilter==='all'?'No consumed batches':'No consumed batches for '+consumedFilter}</td></tr>`;
                return consumed.map(bb => {
                  const globalIdx = breweryBeers.findIndex(x => x.beer === bb.beer && x.batch === bb.batch);
                  const beerInfo = BEERS.find(x => x.code === bb.beer);
                  return `<tr style="opacity:0.65">
                    <td>${badge(bb.beer,'#888')} <span style="font-size:12px;color:var(--muted);margin-left:4px">${beerInfo?.name||bb.beer}</span></td>
                    <td style="font-family:monospace;font-size:13px;cursor:pointer;color:var(--muted);text-decoration:underline"
                      onclick="showBatchHistory('${bb.beer}','${bb.batch}')">${bb.batch}</td>
                    <td><button class="btn btn-ghost btn-sm" style="color:var(--green);border-color:var(--green)"
                      onclick="toggleBatchActive(${globalIdx})">Activate</button></td>
                  </tr>`;
                }).join('');
              })()}
            </tbody>
          </table>
        </div>
      </div>
    </div>`;
}

function toggleBatchActive(idx) {
  if (!breweryBeers[idx]) return;
  breweryBeers[idx].inactive = !breweryBeers[idx].inactive;
  saveBreweryBeers();
  renderPage();
}

function toggleBeerActive(idx) {
  if (!BEERS[idx]) return;
  const beer = BEERS[idx];
  beer.inactive = !beer.inactive;
  // Sync batch inactive state with beer state
  breweryBeers.forEach(bb => {
    if (bb.beer === beer.code) bb.inactive = beer.inactive;
  });
  saveBeers();
  saveBreweryBeers();
  renderPage();
}

function saveBatchForBeer(beerCode) {
  const batchEl = document.getElementById(`new-batch-no-${beerCode}`);
  const litresEl = document.getElementById(`new-batch-litres-${beerCode}`);
  const brewDateEl = document.getElementById(`new-batch-brewdate-${beerCode}`);
  const batch = batchEl?.value?.trim();
  const litres = Number(litresEl?.value) || 0;
  const brewDate = brewDateEl?.value || '';
  if (!batch) { alert('Please enter a batch number.'); return; }
  if (breweryBeers.find(x => x.beer === beerCode && x.batch === batch)) {
    alert('This batch number already exists for this beer.'); return;
  }
  breweryBeers.push({ beer: beerCode, batch, litres, brewDate });
  newBatchBeer = '';
  saveBreweryBeers();
  renderPage();
}

function saveEditBatch(idx) {
  if (!breweryBeers[idx]) return;
  const litresEl = document.getElementById('edit-batch-litres');
  const brewDateEl = document.getElementById('edit-batch-brewdate');
  const newVal = Number(litresEl?.value)||0;
  breweryBeers[idx].litres = newVal;
  breweryBeers[idx].brewDate = brewDateEl?.value || breweryBeers[idx].brewDate || '';
  if (newVal === 0) breweryBeers[idx].inactive = true;
  editingBatchIdx = null;
  saveBreweryBeers();
  renderPage();
}

function editBatchLitres(idx) {
  if (!breweryBeers[idx]) return;
  editingBatchIdx = idx;
  renderPage();
}

function updateBatchLitres(idx, value) {
  if (!breweryBeers[idx]) return;
  const newVal = Number(value) || 0;
  breweryBeers[idx].litres = newVal;
  // Auto-deactivate if reaches 0
  if (newVal === 0) breweryBeers[idx].inactive = true;
  saveBreweryBeers();
  renderPage();
}

function showBatchHistory(beerCode, batchNo) {
  // Find batch entry for brew date
  const batchEntry = breweryBeers.find(x => x.beer === beerCode && x.batch == batchNo);
  const brewDate = batchEntry?.brewDate;

  // Find all orders that used this beer+batch (live orders)
  const deliveries = [];
  orders.forEach(o => {
    const bar = bars.find(b => b.id === o.barId) || { barName: 'Unknown' };
    (o.assignedKegs || []).forEach(a => {
      const fills = a.fills && a.fills.length > 0
        ? a.fills
        : (a.batch === batchNo && a.beer === beerCode ? [{ beer: a.beer, batch: a.batch, litres: a.kegSize || 0 }] : []);
      fills.forEach(f => {
        if (f.beer === beerCode && f.batch === batchNo) {
          deliveries.push({ date: o.deliveryDate, bar: bar.barName, kegNo: a.kegNo, litres: f.litres });
        }
      });
    });
  });

  // Add historical deliveries from sheet
  const histKey = beerCode + batchNo;
  (HISTORICAL_BATCH_DELIVERIES[histKey] || []).forEach(h => {
    // Don't duplicate if live order already has this keg
    if (!deliveries.find(d => d.kegNo === h.kegNo)) {
      deliveries.push({ date: h.date, bar: h.barName, kegNo: h.kegNo, litres: h.litres });
    }
  });

  deliveries.sort((a,b) => a.date.localeCompare(b.date));

  const rows = deliveries.length > 0
    ? deliveries.map(d => `
        <div style="display:flex;align-items:center;gap:14px;padding:11px 0;border-bottom:1px solid #f0f0f0;flex-wrap:wrap">
          <div style="font-family:monospace;font-size:12px;color:#666;min-width:90px">${fmtDate(d.date)}</div>
          <div style="font-weight:600;font-size:14px;flex:1">${d.bar}</div>
          <div style="font-family:monospace;font-size:12px;background:#f5f5f5;padding:2px 8px;border-radius:4px">${d.kegNo}</div>
          <div style="font-size:13px;font-weight:600;color:var(--orange)">${d.litres}L</div>
        </div>`).join('')
    : `<div style="color:#999;font-size:13px;padding:20px 0;text-align:center">No deliveries recorded for this batch yet</div>`;

  const totalLitres = deliveries.reduce((s,d) => s + d.litres, 0);

  document.getElementById('modal-container').innerHTML = `
    <div class="modal-overlay" onclick="if(event.target===this)closeModal()">
      <div class="modal-box" style="max-width:500px">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:18px">
          <div>
            <div style="font-size:18px;font-weight:700">${beerCode} — Batch ${batchNo}</div>
            <div style="font-size:12px;color:#666;margin-top:4px">
              ${brewDate ? `Brewed: <b>${fmtDate(brewDate)}</b> &nbsp;·&nbsp; ` : ''}${batchEntry?.litres ? `Batch Size: <b>${batchEntry.litres}L</b> &nbsp;·&nbsp; ` : ''}${deliveries.length} deliver${deliveries.length!==1?'ies':'y'} · ${totalLitres}L dispatched
            </div>
          </div>
          <button onclick="closeModal()" style="background:none;border:none;font-size:24px;cursor:pointer;color:#999;line-height:1">&times;</button>
        </div>
        <div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:#999;margin-bottom:10px">Delivery History</div>
        <div style="max-height:400px;overflow-y:auto">${rows}</div>
        <div style="margin-top:16px;text-align:right">
          <button onclick="closeModal()" style="background:#e0e0e0;border:none;padding:8px 20px;border-radius:6px;font-weight:600;cursor:pointer;font-size:13px">Close</button>
        </div>
      </div>
    </div>`;
}

let rcSearch = '';
let rcExpandedBar = null;
let rcEditBarId = null;

const MRP_PER_LITRE = 134.4;

async function saveRateCard() {
  localStorage.setItem('2down_ratecard', JSON.stringify(rateCard));
  try { await sbUpsert('kegs', '__ratecard__', { rateCard }); } catch(_) {}
}

function pageRateCard() {
  const activeBars = bars.filter(b => !b.inactive)
    .sort((a,b) => a.barName.localeCompare(b.barName))
    .filter(b => !rcSearch || b.barName.toLowerCase().includes(rcSearch.toLowerCase()));

  const rows = activeBars.map(b => {
    const rates = rateCard[b.id] || {};
    const isExpanded = rcExpandedBar === b.id;
    const isEditing = rcEditBarId === b.id;

    const beerRows = BEERS.filter(beer => !beer.inactive).map(beer => {
      const r = rates[beer.code] || {};
      const total = r.rate ? Number(r.rate) : null;
      const svc = total ? (total - MRP_PER_LITRE).toFixed(2) : null;
      const rateDate = r.date || '';

      if (isEditing) {
        return `<tr>
          <td style="font-weight:600">${badge(beer.code,'#888')} ${beer.name}</td>
          <td>
            <div style="display:flex;align-items:center;gap:5px">
              <span style="color:var(--muted);font-size:13px">₹</span>
              <input type="number" min="0" step="0.1" class="inp" style="width:95px;font-size:13px;padding:5px 8px"
                placeholder="e.g. 400" value="${total||''}"
                data-rc-rate="${b.id}-${beer.code}">
              <span style="color:var(--muted);font-size:12px">/L</span>
            </div>
          </td>
          <td style="font-family:monospace;font-size:13px;color:var(--muted)">₹${MRP_PER_LITRE}/L</td>
          <td style="font-family:monospace;font-size:13px;color:var(--muted)">${total ? '₹'+svc+'/L' : '—'}</td>
          <td>
            <input type="date" class="inp" style="width:150px;font-size:12px;padding:5px 8px"
              value="${rateDate}"
              data-rc-date="${b.id}-${beer.code}">
          </td>
        </tr>`;
      }

      return `<tr>
        <td style="font-weight:600">${badge(beer.code,'#888')} ${beer.name}</td>
        <td style="font-family:monospace;font-size:14px;font-weight:700">
          ${total ? `₹${total}/L` : `<span style="color:var(--muted)">—</span>`}
        </td>
        <td style="font-family:monospace;font-size:13px;color:var(--muted)">₹${MRP_PER_LITRE}/L</td>
        <td style="font-family:monospace;font-size:13px;color:var(--muted)">${svc ? '₹'+svc+'/L' : '—'}</td>
        <td style="font-size:12px;color:var(--muted)">${rateDate ? fmtDate(rateDate) : '—'}</td>
      </tr>`;
    }).join('');

    // Invoicing entity — always editable inline, not tied to edit mode
    const entity = rates.__entity__ || 'SAGA GYPSY BEER PROJECT';
    const entityRow = `<div style="display:flex;align-items:center;gap:12px;margin-bottom:16px;padding-bottom:16px;border-bottom:1px solid var(--border);flex-wrap:wrap">
      <span style="font-size:12px;color:var(--muted);white-space:nowrap">Service Invoice by:</span>
      <div style="display:flex;gap:8px">
        <button onclick="setBarEntity(${b.id},'SAGA GYPSY BEER PROJECT');event.stopPropagation()"
          class="btn btn-sm ${entity==='SAGA GYPSY BEER PROJECT'?'btn-primary':'btn-ghost'}"
          style="font-size:12px;padding:5px 12px">SAGA GYPSY BEER PROJECT</button>
        <button onclick="setBarEntity(${b.id},'TWO DOWN HOSPITALITY');event.stopPropagation()"
          class="btn btn-sm ${entity==='TWO DOWN HOSPITALITY'?'btn-primary':'btn-ghost'}"
          style="font-size:12px;padding:5px 12px">TWO DOWN HOSPITALITY</button>
      </div>
    </div>`;

    const expandedPanel = isExpanded ? `
      <div style="padding:0 18px 18px">
        ${entityRow}
        <table class="tbl" style="font-size:13px">
          <thead><tr>
            <th>Beer</th>
            <th style="color:var(--orange)">Total Rate</th>
            <th>MRP Rate</th>
            <th>Service Rate</th>
            <th>Effective From</th>
          </tr></thead>
          <tbody>${beerRows}</tbody>
        </table>
        <div style="display:flex;gap:10px;margin-top:14px">
          ${isEditing
            ? `<button class="btn btn-primary btn-sm" onclick="saveRateCardBar(${b.id})">Save</button>
               <button class="btn btn-ghost btn-sm" onclick="rcEditBarId=null;renderPage()">Cancel</button>`
            : `<button class="btn btn-ghost btn-sm" onclick="rcEditBarId=${b.id};renderPage()">✎ Edit Rates</button>`}
        </div>
      </div>` : '';

    return `<div data-search='${b.barName} ${b.area} ${(rates.__entity__||'SAGA GYPSY BEER PROJECT')}' style="border:1px solid var(--border);border-radius:10px;margin-bottom:10px;overflow:hidden">
      <div style="display:flex;align-items:center;gap:14px;padding:14px 18px;cursor:pointer"
        onclick="rcExpandedBar=rcExpandedBar===${b.id}?null:${b.id};rcEditBarId=null;renderPage()">
        <div style="flex:1">
          <div style="font-weight:600;font-size:14px">${b.barName}</div>
          <div style="font-size:11px;color:var(--muted);margin-top:2px">${b.area}</div>
        </div>
        <div style="display:flex;align-items:center;gap:12px">
          <span style="font-size:11px;font-weight:600;padding:2px 8px;border-radius:4px;${entity==='SAGA GYPSY BEER PROJECT'?'background:rgba(88,166,255,0.1);color:#58A6FF':'background:rgba(245,166,35,0.1);color:var(--accent)'}">${entity==='SAGA GYPSY BEER PROJECT'?'SAGA':'TWO DOWN'}</span>
          <div style="font-size:16px;color:var(--muted)">${isExpanded ? '▲' : '▼'}</div>
        </div>
      </div>
      ${expandedPanel}
    </div>`;
  }).join('') || `<div class="empty">No bars found</div>`;

  return `
    <div style="display:flex;gap:10px;align-items:center;margin-bottom:20px;flex-wrap:wrap">
      <input id="rc-search-inp" class="inp" placeholder="Search bar or invoicing entity…" value="${rcSearch}"
        oninput="setRcSearch(this.value)" style="width:300px">
      <span id="rc-count" style="font-size:12px;color:var(--muted)">${activeBars.length} bars</span>
      <div style="font-size:12px;color:var(--muted);margin-left:auto">
        MRP fixed at <b>₹${MRP_PER_LITRE}/litre</b> · Service = Total − MRP
      </div>
    </div>
    <div id="rc-tbody">${rows}</div>`;
}

function setRate(barId, beerCode, field, value) {
  if (!rateCard[barId]) rateCard[barId] = {};
  if (!rateCard[barId][beerCode]) rateCard[barId][beerCode] = { rate: '', date: '' };
  rateCard[barId][beerCode][field] = value;
}

function setBarEntity(barId, entity) {
  if (!rateCard[barId]) rateCard[barId] = {};
  rateCard[barId].__entity__ = entity;
  saveRateCard();
  renderPage();
}

function saveRateCardBar(barId) {
  // Read beer rates and dates from DOM
  BEERS.forEach(beer => {
    const rateInp = document.querySelector(`input[data-rc-rate="${barId}-${beer.code}"]`);
    const dateInp = document.querySelector(`input[data-rc-date="${barId}-${beer.code}"]`);
    if (rateInp || dateInp) {
      if (!rateCard[barId]) rateCard[barId] = {};
      if (!rateCard[barId][beer.code]) rateCard[barId][beer.code] = { rate: '', date: '' };
      if (rateInp) rateCard[barId][beer.code].rate = rateInp.value ? Number(rateInp.value) : '';
      if (dateInp) rateCard[barId][beer.code].date = dateInp.value || '';
      if (!rateCard[barId][beer.code].rate && !rateCard[barId][beer.code].date) {
        delete rateCard[barId][beer.code];
      }
    }
  });
  rcEditBarId = null;
  saveRateCard();
  renderPage();
}
